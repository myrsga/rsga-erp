    // Data rows styling
    dataRows.forEach((_,i)=>{
      const rowN=i+6;
      const l=logData[studentList[i]?.id]||{};
      const statusBg=l.status==='Attended'?'DCFCE7':l.status==='Not Attended'?'FEE2E2':l.status==='Promised'?'DBEAFE':l.status==='Busy/Retry'?'EDE9FE':'FEFCE8';
      const isEven=i%2===0;
      const rowBg=isEven?'FFFFFF':'F8FAFC';
      ['A','B','C','D','E','F','G'].forEach(col=>applyStyle(wsReg,`${col}${rowN}`,cs({sz:10,bg:rowBg,border:true})));
      applyStyle(wsReg,`H${rowN}`,cs({sz:10,bold:true,bg:statusBg,align:'center',border:true}));
      applyStyle(wsReg,`I${rowN}`,cs({sz:10,bg:rowBg,wrap:true,border:true}));
      applyStyle(wsReg,`J${rowN}`,cs({sz:9,bg:rowBg,wrap:true,border:true,fc:'475569'}));
    });
    wsReg['!cols']=[{wch:4},{wch:22},{wch:20},{wch:10},{wch:14},{wch:14},{wch:12},{wch:16},{wch:26},{wch:32}];
    wsReg['!merges']=[
      {s:{r:0,c:0},e:{r:0,c:9}},{s:{r:1,c:0},e:{r:1,c:9}},{s:{r:2,c:0},e:{r:2,c:9}},
    ];
    wsReg['!rows']=[{hpt:26},{hpt:20},{hpt:16},{hpt:6},{hpt:18}];
    XLSX.utils.book_append_sheet(wb,wsReg,'📋 Call Register');

    // ── PENDING SHEET ──────────────────────────────────────────────
    const pendingList=studentList.filter(s=>!logData[s.id]?.done);
    if(pendingList.length){
      const pendTitle=[
        ['R.S. GLOBAL ACADEMY — PENDING CALLS','','','',''],
        [`${label}  ·  ${pendingList.length} students remaining  ·  ${dateStr}`,'','','',''],
        ['','','','',''],
        ['#','Student Name','Father Name','Phone Number','Area/Village'],
        ...pendingList.map((s,i)=>[i+1,s.name||'',s.fatherName||'',s.mobile||'',s.area||s.village||'']),
      ];
      const wsPend=XLSX.utils.aoa_to_sheet(pendTitle);
      applyStyle(wsPend,'A1',cs({bold:true,sz:12,bg:'DC2626',fc:'FFFFFF',align:'center'}));
      applyStyle(wsPend,'A2',cs({sz:10,bg:'FEF2F2',fc:'B91C1C',align:'center'}));
      ['A4','B4','C4','D4','E4'].forEach(r=>applyStyle(wsPend,r,cs({bold:true,sz:10,bg:'FEE2E2',border:true})));
      pendingList.forEach((_,i)=>{
        ['A','B','C','D','E'].forEach(col=>applyStyle(wsPend,`${col}${i+5}`,cs({sz:10,bg:i%2?'FEF2F2':'FFFFFF',border:true})));
      });
      wsPend['!cols']=[{wch:4},{wch:22},{wch:20},{wch:14},{wch:16}];
      wsPend['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:1,c:0},e:{r:1,c:4}}];
      XLSX.utils.book_append_sheet(wb,wsPend,'⚠️ Pending Calls');
    }

    const fname=`RSGA_Calling_${sc}-${ss}_${label.replace(/[\s·\/]/g,'_').replace(/__+/g,'_')}_${now2.toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb,fname);
  };

  // ── STATUS OPTIONS ───────────────────────────────────────────────
  // ── SMART DROPDOWNS BY CALL TYPE ────────────────────────────────────
  const getStatusOpts=(type)=>[
    {v:'Attended',      label:'✅ Attended — Phone uthaya'},
    {v:'Not Attended',  label:'📵 Not Attended — Call nahi uthaya'},
    {v:'Busy/Retry',    label:'🔄 Busy — Baad mein try karna'},
    {v:'Switched Off',  label:'📴 Switched Off'},
    {v:'Wrong Number',  label:'❌ Wrong / Invalid Number'},
    {v:'Unreachable',   label:'📶 Out of Coverage'},
    {v:'Promised',      label:'🤝 Promise Liya — Date di'},
  ];
  const getResponseOpts=(type)=>{
    const common=[
      {v:'Jaldi Jama Karaenge',       label:'💰 Jaldi Jama Karaenge'},
      {v:'15 Tak Jama Karaenge',      label:'📅 15 Tak Jama Karaenge'},
      {v:'20 Tak Jama Karaenge',      label:'📅 20 Tak Jama Karaenge'},
      {v:'Month End Tak Jamaenge',    label:'📅 Month End Tak Jamaenge'},
      {v:'Already Jama Ho Gayi',      label:'✅ Fees Already Jama Ho Gayi'},
      {v:'Call Nahi Uthaya',          label:'📵 Call Nahi Uthaya'},
      {v:'Number Galat/Band',         label:'❌ Number Galat / Band'},
      {v:'Baad Mein Aayenge',         label:'🏫 Baad Mein School Aayenge'},
      {v:'WhatsApp Message Diya',     label:'💬 WhatsApp Message Diya'},
      {v:'Parent Ne Mana Kiya',       label:'🚫 Parent Ne Mana Kiya'},
      {v:'TC Le Li',                  label:'📋 TC Le Li / School Chhod Di'},
    ];
    if(type==='fee') return[
      ...common,
      {v:'Kist Mein Bharenge',        label:'🔁 Kist Mein Bharenge'},
      {v:'Scholarship Apply Kiya',    label:'🎓 Scholarship Apply Kiya'},
    ];
    if(type==='absent') return[
      {v:'Bimarr Tha/Thi',            label:'🤒 Bimaar Tha/Thi'},
      {v:'Ghar Mein Kaam Tha',        label:'🏠 Ghar Mein Kaam Tha'},
      {v:'Bahar Gaya Tha',            label:'✈️ Bahar Gaya Tha'},
      {v:'Kal Aayega/Aayegi',         label:'📅 Kal Zaroor Aayega'},
      {v:'Personal Reason',           label:'🔒 Personal Reason'},
      ...common.slice(5),
    ];
    if(type==='weak') return[
      {v:'School Aayenge',            label:'🏫 School Aayenge — PTM'},
      {v:'Ghar Pe Padhai Karaenge',   label:'📚 Ghar Pe Padhai Karaenge'},
      {v:'Tuition Laga Diya',         label:'✏️ Tuition Laga Diya'},
      {v:'Dhyan Dilaya — Agree Kiya', label:'👍 Dhyan Dilaya — Agree Kiya'},
      {v:'Koi Response Nahi',         label:'😶 Koi Theek Response Nahi'},
      ...common.slice(5),
    ];
    if(type==='study') return[
      {v:'Ghar Pe Padhai Karaenge',   label:'📚 Ghar Pe Padhai Karaenge'},
      {v:'Time Table Banaenge',        label:'📅 Ghar Par Time Table Banaenge'},
      {v:'Tuition Laga Diya',         label:'✏️ Tuition Laga Diya'},
      {v:'Dhyan Dilaya — Agree Kiya', label:'👍 Dhyan Dilaya — Agree Kiya'},
      {v:'Baccha Seedha Nahi Maanta', label:'😓 Baccha Seedha Nahi Maanta'},
      {v:'Koi Response Nahi',         label:'😶 Koi Theek Response Nahi'},
      ...common.slice(5),
    ];
    return common;
  };

  // ── BILINGUAL WA MESSAGE BUILDER ────────────────────────────────────
  const getBilingualMsg=(type,s,callLabel)=>{
    const temps=DB.get('watemps',[]);
    if(!temps.length)return '';
    const sname=s.name||'Your ward';
    const fname=s.fatherName||'Parent';
    const cls_=`${s.class||sc}-${s.section||ss}`;
    // type se naam match karo (case-insensitive partial match)
    const typeKeywords={
      absent:['absent','absen','غیر حاضر'],
      fee:['fee','fees','शुल्क','फीस'],
      weak:['weak','performance','kamzor'],
      study:['study','padhai','focus'],
      general:['general','notice','सूचना'],
    };
    const keywords=typeKeywords[type]||[];
    let tpl=temps.find(t=>keywords.some(k=>t.name.toLowerCase().includes(k)));
    if(!tpl)tpl=temps[0]; // fallback: pehla template
    if(!tpl)return '';
    return tpl.text
      .replace(/{name}/g,sname)
      .replace(/{father}/g,fname)
      .replace(/{class}/g,s.class||sc)
      .replace(/{section}/g,s.section||ss)
      .replace(/{date}/g,fmtDate(tod()))
      .replace(/{callLabel}/g,callLabel||'');
  };

  // ── STUDENT CALL CARD (Remarks debounce fixed) ──────────────────────
  const CallCard=({s,type,extra,callLabel})=>{
    const l=getLog(type,extra,s.id);
    const[open,setOpen]=useState(false);
    const[localRemarks,setLocalRemarks]=useState(l.remarks||'');
    // Sync if log changes externally
    React.useEffect(()=>{ setLocalRemarks(l.remarks||''); },[l.remarks]);
    const remarkTimer=React.useRef(null);
    // Cleanup timer on unmount to prevent memory leak
    React.useEffect(()=>()=>{clearTimeout(remarkTimer.current);},[]);
    const onRemarksChange=(val)=>{
      setLocalRemarks(val);
      clearTimeout(remarkTimer.current);
      remarkTimer.current=setTimeout(()=>{ updateLog(type,extra,s.id,'remarks',val); },600);
    };
    const statusColor=l.status==='Attended'?{bg:'#dcfce7',c:'#15803d'}:l.status==='Not Attended'?{bg:'#fee2e2',c:'#b91c1c'}:l.status==='Promised'?{bg:'#dbeafe',c:'#1d4ed8'}:{bg:'#fef9c3',c:'#92400e'};
    return(
      <div style={{background:l.done?'#f0fdf4':'#fff',border:`1.5px solid ${l.done?'#86efac':'#e2e8f0'}`,borderRadius:'12px',padding:'13px 16px',transition:'all .2s'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <div style={{width:'38px',height:'38px',borderRadius:'50%',background:l.done?'#22c55e':'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'800',fontSize:'15px',color:l.done?'#fff':'#64748b',flexShrink:0}}>{s.name?s.name[0]:'?'}</div>
          <div style={{flex:1,minWidth:'110px'}}>
            <div style={{fontWeight:'700',fontSize:'13px'}}>{s.name}</div>
            <div style={{fontSize:'11px',color:'#64748b'}}>Father: {s.fatherName||'—'} {s.mobile?`· ${s.mobile}`:''}</div>
            {l.status&&<span style={{fontSize:'10px',fontWeight:'700',padding:'2px 7px',borderRadius:'20px',background:statusColor.bg,color:statusColor.c,marginTop:'3px',display:'inline-block'}}>{l.status}</span>}
            {l.response&&<span style={{fontSize:'10px',color:'#64748b',marginLeft:'6px'}}>"{l.response}"</span>}
          </div>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap',alignItems:'center'}}>
            <a href={`tel:${s.mobile}`} className="btn btn-sm btn-outline" style={{textDecoration:'none',padding:'5px 10px'}}><i className="fas fa-phone"/>{s.mobile||'No No.'}</a>
            <a href={waLink(s.mobile,getBilingualMsg(type,s,callLabel))} className="btn btn-sm btn-wa" style={{textDecoration:'none',padding:'5px 10px'}} onClick={e=>openWA(waLink(s.mobile,getBilingualMsg(type,s,callLabel)),e)} title="Bilingual WhatsApp message"><i className="fab fa-whatsapp"/>WA</a>
            {canEdit&&<button className={`btn btn-sm ${l.done?'btn-success':'btn-ghost'}`} style={{padding:'5px 10px'}} onClick={()=>{updateLog(type,extra,s.id,'done',!l.done);setOpen(!l.done);}}>
              <i className={`fas ${l.done?'fa-check-circle':'fa-circle'}`}/>{l.done?'Called':'Mark Called'}
            </button>}
            {l.done&&<button style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:'14px'}} onClick={()=>setOpen(o=>!o)}><i className={`fas fa-chevron-${open?'up':'down'}`}/></button>}
          </div>
        </div>
        {(l.done||open)&&(
          <div style={{marginTop:'10px',display:'grid',gap:'6px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
              <select className="select" style={{fontSize:'12px'}} value={l.status||''} onChange={e=>updateLog(type,extra,s.id,'status',e.target.value)}>
                <option value="">📞 Call Status</option>
                {getStatusOpts(type).map(o=><option key={o.v} value={o.v}>{o.label}</option>)}
              </select>
              <select className="select" style={{fontSize:'12px'}} value={l.response||''} onChange={e=>updateLog(type,extra,s.id,'response',e.target.value)}>
                <option value="">💬 Parent Response</option>
                {getResponseOpts(type).map(o=><option key={o.v} value={o.v}>{o.label}</option>)}
              </select>
            </div>
            <input className="input" style={{fontSize:'12px'}} placeholder="✏️ Extra remarks / notes (freely type karo)..." value={localRemarks} onChange={e=>onRemarksChange(e.target.value)}/>
          </div>
        )}
      </div>
    );
  };

  // ── CALLING SECTION WRAPPER ────────────────────────────────────────
  const CallingSection=({type,extra,label,studentList,callLabel,emptyMsg})=>{
    const logKey=getLogKey(type,extra);
    const logData=DB.get(logKey,{})||{};
    const calledCount=studentList.filter(s=>logData[s.id]?.done).length;
    const[filter,setFilter]=useState('all');
    const filtered=filter==='pending'?studentList.filter(s=>!logData[s.id]?.done):filter==='called'?studentList.filter(s=>logData[s.id]?.done):studentList;
    return(
      <>
        {studentList.length>0&&(
          <div style={{display:'flex',gap:'8px',alignItems:'center',marginBottom:'12px',flexWrap:'wrap'}}>
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'10px',padding:'8px 14px',fontSize:'12px',fontWeight:'700',color:'#15803d'}}>{calledCount}/{studentList.length} Called</div>
            <div style={{background:'#fef9c3',border:'1px solid #fde047',borderRadius:'10px',padding:'8px 14px',fontSize:'12px',fontWeight:'700',color:'#92400e'}}>{studentList.length-calledCount} Pending</div>
            <select className="select" style={{fontSize:'12px',width:'120px'}} value={filter} onChange={e=>setFilter(e.target.value)}>
              <option value="all">All ({studentList.length})</option>
              <option value="pending">Pending ({studentList.length-calledCount})</option>
              <option value="called">Called ({calledCount})</option>
            </select>
            {canEdit&&<button className="btn btn-sm" style={{background:'#16a34a',color:'#fff',border:'none',marginLeft:'auto'}} onClick={()=>exportExcel(type,extra,label,studentList)}><i className="fas fa-file-excel"/> Export Excel</button>}
          </div>
        )}
        {filtered.length===0?<div className="nodata"><i className="fas fa-phone-slash"/><p>{emptyMsg||'No students'}</p></div>:(
          <div style={{display:'grid',gap:'8px'}}>
            {filtered.map(s=><CallCard key={s.id} s={s} type={type} extra={extra} callLabel={callLabel}/>)}
          </div>
        )}
      </>
    );
  };

  const feeLabel=`Fees Due: ${new Date(feeMonth+'-01').toLocaleString('default',{month:'long',year:'numeric'})}`;
  const moLabel=new Date(month+'-01').toLocaleString('default',{month:'long',year:'numeric'});

  return(
    <div className="fade">
      {/* ── TAB BAR ── */}
      <div style={{display:'flex',gap:'4px',marginBottom:'14px',overflowX:'auto',paddingBottom:'2px'}}>
        {[['fee','💰 Fee Calling'],['absent','📞 Absent Calling'],['weak','⚠️ Weak Students'],['study','📖 Padhai Alert'],['general','📋 Monthly General'],['custom','🏷️ Custom'],['assigned','📥 Assigned']].map(([id,lbl])=>(
          <div key={id} className={`tab ${tab===id?'active':''}`} style={{whiteSpace:'nowrap',minWidth:'fit-content'}} onClick={()=>setTab(id)}>{lbl}</div>
        ))}
      </div>

      <div className="card">
        {/* ── CLASS/SECTION SELECTOR ── */}
        <div className="fx" style={{marginBottom:'14px',flexWrap:'wrap'}}>
          <div><label className="label">Class</label><select className="select" style={{width:'90px'}} value={sc} onChange={e=>{const c=e.target.value;const ns=accessList===null?(DB.get('sections',{})[c]||['A1'])[0]:(accessList.find(x=>x.class===c)||{section:'A1'}).section;setSc(c);setSs(ns);}}>{allowedCls.map(c=><option key={c} value={c}>Cls {c}</option>)}</select></div>
          <div><label className="label">Section</label><select className="select" style={{width:'90px'}} value={ss} onChange={e=>setSs(e.target.value)}>{(accessList===null?(DB.get('sections',{})[sc]||[]):accessList.filter(x=>x.class===sc).map(x=>x.section)).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          {tab==='fee'&&<div><label className="label">Fee Month</label><input className="input" type="month" style={{width:'160px'}} value={feeMonth} onChange={e=>setFeeMonth(e.target.value)}/></div>}
          {(tab==='general'||tab==='absent')&&<div><label className="label">{tab==='absent'?'Date':'Month'}</label>{tab==='absent'?<input className="input" type="date" style={{width:'148px'}} value={date} onChange={e=>setDate(e.target.value)} max={tod()}/>:<input className="input" type="month" style={{width:'160px'}} value={month} onChange={e=>setMonth(e.target.value)}/>}</div>}
        </div>

        {/* ── FEE CALLING ── */}
        {tab==='fee'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#0f766e,#0d9488)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>💰 {feeLabel}</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>Class {sc}-{ss} · {sts.length} students</div>
            </div>
            <CallingSection type="fee" extra={feeMonth} label={feeLabel} studentList={sts} callLabel={`Fee pending for ${feeLabel}`} emptyMsg="No students in this class"/>
          </>
        )}

        {/* ── ABSENT CALLING ── */}
        {tab==='absent'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#dc2626,#ef4444)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>📞 Absent Calling — {date}</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>{abSts.length} absent students · Class {sc}-{ss}</div>
            </div>
            <CallingSection type="absent" extra={date} label={`Absent Calling ${date}`} studentList={abSts} callLabel={`Absent on ${date}`} emptyMsg="No absences on this date. Mark attendance first."/>
          </>
        )}

        {/* ── MONTHLY GENERAL CALLING ── */}
        {tab==='general'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#1d4ed8,#3b82f6)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>📋 Monthly General Calling — {moLabel}</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>Class {sc}-{ss} · {sts.length} students · Progress/Feedback</div>
            </div>
            <CallingSection type="general" extra={month} label={`General Calling ${moLabel}`} studentList={sts} callLabel={`Monthly general call — ${moLabel}`} emptyMsg="No students in this class"/>
          </>
        )}

        {/* ── CUSTOM CALLING ── */}
        {tab==='custom'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#7c3aed,#8b5cf6)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>🏷️ Custom Calling</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>PTM / Health / Event / Apni category banao</div>
            </div>
            <div style={{marginBottom:'12px'}}>
              <label className="label">Category Select / Create Karo</label>
              <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'8px'}}>
                {customTagList.map(t=>(
                  <button key={t} className={`btn btn-sm ${customTag===t?'btn-primary':' btn-ghost'}`} style={customTag===t?{background:'#7c3aed',color:'#fff',border:'none'}:{}} onClick={()=>setCustomTag(t)}>{t}</button>
                ))}
              </div>
              <div style={{display:'flex',gap:'6px'}}>
                <input className="input" style={{fontSize:'12px'}} placeholder="Nayi category type karo..." value={newTag} onChange={e=>setNewTag(e.target.value)}/>
                <button className="btn btn-sm btn-primary" style={{background:'#7c3aed',color:'#fff',border:'none',whiteSpace:'nowrap'}} onClick={()=>{if(!newTag.trim())return;const updated=[...customTagList,newTag.trim()];setCustomTagList(updated);DB.set('custom_call_tags',updated);setCustomTag(newTag.trim());setNewTag('');}}>+ Add</button>
              </div>
            </div>
            {customTag?(
              <>
                <div style={{fontWeight:'700',fontSize:'13px',color:'#7c3aed',marginBottom:'10px'}}>📌 {customTag} — Class {sc}-{ss}</div>
                <CallingSection type="custom" extra={customTag.replace(/\s+/g,'_')} label={customTag} studentList={sts} callLabel={customTag} emptyMsg="No students in this class"/>
              </>
            ):(
              <div className="nodata"><i className="fas fa-tag"/><p>Pehle ek category select karo</p></div>
            )}
          </>
        )}
        {tab==='weak'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#b45309,#f59e0b)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>⚠️ Weak Students Calling</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>{weakSts.length} weak students — Low attendance / Low test score · Class {sc}-{ss}</div>
            </div>
            <CallingSection type="weak" extra={`${sc}_${ss}`} label={`Weak Students ${sc}-${ss}`} studentList={weakSts} callLabel="Performance/Attendance issue — please visit school" emptyMsg="🎉 No weak students in this class!"/>
          </>
        )}
        {tab==='study'&&(
          <>
            <div style={{background:'linear-gradient(135deg,#5b21b6,#7c3aed)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
              <div style={{fontWeight:'800',fontSize:'14px'}}>📖 Padhai Alert — Study Focus Calling</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>Low test score / Low HW — Ghar pe padhai pe dhyan dilane ke liye · Class {sc}-{ss}</div>
            </div>
            <CallingSection type="study" extra={`${sc}_${ss}`} label={`Padhai Alert ${sc}-${ss}`} studentList={weakSts.filter(s=>s.issues&&s.issues.some(i=>i.type==='test'||i.type==='hw'))} callLabel="Ghar pe padhai pe dhyan dene ki request — Study Focus" emptyMsg="🎉 No students with low study performance in this class!"/>
          </>
        )}
        {tab==='assigned'&&(()=>{
          const allAssign=DB.get('assigned_calls',[])||[];
          const myAssign=allAssign.filter(a=>a.teacherId===user.id);
          return(
            <>
              <div style={{background:'linear-gradient(135deg,#0369a1,#0ea5e9)',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',color:'#fff'}}>
                <div style={{fontWeight:'800',fontSize:'14px'}}>📥 Assigned Calling Lists</div>
                <div style={{fontSize:'12px',color:'rgba(255,255,255,.8)',marginTop:'2px'}}>Dev/Admin ne aapke liye assign ki hain — {myAssign.length} lists</div>
              </div>
              {myAssign.length===0?(
                <div className="nodata"><i className="fas fa-inbox"/><p>Koi list assign nahi hui abhi</p><p style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>Developer se request karo</p></div>
              ):(
                <div style={{display:'grid',gap:'12px'}}>

// ── WEAK STUDENTS ──────────────────────────────────────────────────────
function WeakStudents({user}){
  const accessList=getAccessibleCS(user);
  const allowedCls=accessList===null?DB.get('classes',[]):[...new Set(accessList.map(x=>x.class))];
  const defC=getDefClass(user)||allowedCls[0]||'8';
  const defS=getDefSection(user)||(accessList===null?'A1':(accessList.find(x=>x.class===defC)||{section:'A1'}).section);
  const[sc,setSc]=useState(defC);const[ss,setSs]=useState(defS);
  const cls=DB.get('classes',[]);const sec=DB.get('sections',{});
  const sts=DB.get('students',[]).filter(s=>s.class===sc&&s.section===ss);
  const n=now();const mo=n.getMonth()+1;const yr=n.getFullYear();
  const subs=DB.get('subjects',['English','Mathematics','Science']);
  const analyze=()=>sts.map(s=>{
    const wds=workDays(yr,mo);let present=0;
    wds.forEach(d=>{if((DB.get(`att_${sc}_${ss}_${d}`,{})||{})[s.id]==='P')present++;});
    const attPct=wds.length?pct(present,wds.length):100;
    const testScores=subs.slice(0,3).flatMap(sub=>[1,2,3,4,5].map(w=>{const v=DB.get(`wt_${sc}_${ss}_${sub}_${yr}_${mo}_w${w}`,{})[s.id];return v&&v!=='A'?parseFloat(v):null;}).filter(v=>v!==null));
    const avgTest=testScores.length?testScores.reduce((a,b)=>a+b,0)/testScores.length:null;
    const hwScores=subs.slice(0,2).flatMap(sub=>workDays(yr,mo).map(d=>{const v=(DB.get(`hw_${sc}_${ss}_${sub}_${yr}_${mo}`,{})||{})[s.id]?.[d];return v&&v!=='A'?parseFloat(v):null;}).filter(v=>v!==null));
    const avgHw=hwScores.length?hwScores.reduce((a,b)=>a+b,0)/hwScores.length:null;
    const issues=[];
    if(attPct<75)issues.push({type:'att',label:`Low Attendance: ${attPct}%`,severity:'high'});
    if(avgTest!==null&&avgTest<8)issues.push({type:'test',label:`Very Low Test: ${avgTest.toFixed(1)}/20`,severity:'high'});
    else if(avgTest!==null&&avgTest<12)issues.push({type:'test',label:`Low Test Avg: ${avgTest.toFixed(1)}/20`,severity:'medium'});
    if(avgHw!==null&&avgHw<4)issues.push({type:'hw',label:`Low HW: ${avgHw.toFixed(1)}/10`,severity:'medium'});
    return{...s,attPct,avgTest,avgHw,issues,priority:issues.filter(i=>i.severity==='high').length*2+issues.filter(i=>i.severity==='medium').length};
  }).filter(s=>s.issues.length>0).sort((a,b)=>b.priority-a.priority);
  const weak=useMemo(analyze,[sc,ss,mo,yr]);
  const highCount=weak.filter(s=>s.priority>=2).length;
  return(
    <div className="fade">
      <div className="card" style={{marginBottom:'14px'}}>
        <div className="fx">
          <div><label className="label">Class</label><select className="select" style={{width:'90px'}} value={sc} onChange={e=>{const c=e.target.value;const ns=accessList===null?(DB.get('sections',{})[c]||['A1'])[0]:(accessList.find(x=>x.class===c)||{section:'A1'}).section;setSc(c);setSs(ns);}}>{allowedCls.map(c=><option key={c} value={c}>Cls {c}</option>)}</select></div>
          <div><label className="label">Section</label><select className="select" style={{width:'90px'}} value={ss} onChange={e=>setSs(e.target.value)}>{(accessList===null?(DB.get('sections',{})[sc]||[]):accessList.filter(x=>x.class===sc).map(x=>x.section)).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
        </div>
      </div>
      <div className="g3" style={{marginBottom:'14px'}}>
        <div className="stat"><div className="sico" style={{background:'#fef2f2'}}><i className="fas fa-exclamation-triangle" style={{color:'#ef4444'}}/></div><div><div style={{fontSize:'24px',fontWeight:'900',color:'#1e293b'}}>{weak.length}</div><div style={{fontSize:'12px',color:'#64748b',fontWeight:'600'}}>Weak Students</div></div></div>
        <div className="stat"><div className="sico" style={{background:'#fee2e2'}}><i className="fas fa-fire" style={{color:'#dc2626'}}/></div><div><div style={{fontSize:'24px',fontWeight:'900',color:'#1e293b'}}>{highCount}</div><div style={{fontSize:'12px',color:'#64748b',fontWeight:'600'}}>High Priority</div></div></div>
        <div className="stat"><div className="sico" style={{background:'#fef3c7'}}><i className="fas fa-chart-line" style={{color:'#d97706'}}/></div><div><div style={{fontSize:'24px',fontWeight:'900',color:'#1e293b'}}>{sts.length-weak.length}</div><div style={{fontSize:'12px',color:'#64748b',fontWeight:'600'}}>Students OK</div></div></div>
      </div>
      {weak.length===0?<div className="card"><div className="nodata"><i className="fas fa-check-circle" style={{color:'#22c55e',opacity:1}}/><p style={{color:'#22c55e',fontWeight:'700'}}>No weak students! 🎉</p><p style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>Class {sc}-{ss} — all students performing well</p></div></div>:(
        <div style={{display:'grid',gap:'10px'}}>
          {weak.map((s,i)=>(
            <div key={s.id} style={{background:'#fff',border:`1.5px solid ${s.priority>=2?'#fca5a5':'#fde68a'}`,borderRadius:'12px',padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'12px',flexWrap:'wrap'}}>
                <div style={{width:'40px',height:'40px',borderRadius:'50%',background:s.priority>=2?'#ef4444':'#f59e0b',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'900',fontSize:'18px',color:'#fff',flexShrink:0}}>
                  {i+1}
                </div>
                <div style={{flex:1,minWidth:'150px'}}>
                  <div style={{fontWeight:'800',fontSize:'14px'}}>{s.name}</div>
                  <div style={{fontSize:'11px',color:'#64748b',marginTop:'2px'}}>Father: {s.fatherName}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginTop:'8px'}}>
                    {s.issues.map((iss,ii)=>(
                      <span key={ii} className={`badge ${iss.severity==='high'?'badge-r':'badge-o'}`} style={{fontSize:'10px'}}>
                        {iss.type==='att'?'📅':iss.type==='test'?'📝':'📋'} {iss.label}
                      </span>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                  <a href={`tel:${s.mobile}`} className="btn btn-sm btn-outline" style={{textDecoration:'none'}}><i className="fas fa-phone"/>{s.mobile}</a>
                  <a href={waLink(s.mobile,bilingualWA('weak',s,s.issues.map(i=>i.label).join('\n')))} className="btn btn-sm btn-wa" style={{textDecoration:'none'}} onClick={e=>openWA(waLink(s.mobile,bilingualWA('weak',s,s.issues.map(i=>i.label).join('\n'))),e)}><i className="fab fa-whatsapp"/>WA Alert</a>
                  {s.issues.some(i=>i.type==='test'||i.type==='hw')&&<a href={waLink(s.mobile,bilingualWA('study',s,s.issues.filter(i=>i.type==='test'||i.type==='hw').map(i=>'• '+i.label).join('\n')))} className="btn btn-sm" style={{textDecoration:'none',background:'#7c3aed',color:'#fff',borderRadius:'8px',padding:'6px 12px',fontSize:'12px',fontWeight:'700',display:'inline-flex',alignItems:'center',gap:'5px'}} onClick={e=>openWA(waLink(s.mobile,bilingualWA('study',s,s.issues.filter(i=>i.type==='test'||i.type==='hw').map(i=>'• '+i.label).join('\n'))),e)} title="Padhai pe dhyan dene ke liye message"><i className="fas fa-book"/>📖 Padhai Alert</a>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

                <div style={{fontSize:'11px',color:'#64748b'}}>Class {s.class}-{s.section} • {s.count} tests</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:'900',fontSize:'26px',color:i===0?'#d97706':i===1?'#475569':i===2?'#92400e':'var(--navy)'}}>{s.avg.toFixed(1)}</div>
                <div style={{fontSize:'11px',color:'#94a3b8'}}>/20 avg</div>
                <span className={`badge ${grade(s.avg,20).c}`} style={{marginTop:'2px'}}>{grade(s.avg,20).g}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── WHATSAPP ───────────────────────────────────────────────────────────
function WhatsApp({user}){
  const[temps,setTemps]=useState(DB.get('watemps',[]));
  const[sel,setSel]=useState(null);
  const[editText,setEditText]=useState('');
  const[editName,setEditName]=useState('');
  const[addMode,setAddMode]=useState(false);
  const[newName,setNewName]=useState('');
  const[newText,setNewText]=useState('');
  const[saved,setSaved]=useState(false);
  const accessList=getAccessibleCS(user);
  const defC=getDefClass(user)||(accessList===null?'8':(accessList[0]||{class:'8'}).class);
  const defS=getDefSection(user)||(accessList===null?'A1':(accessList[0]||{section:'A1'}).section);
  const[sc,setSc]=useState(defC);const[ss,setSs]=useState(defS);
  const[customMsg,setCustomMsg]=useState('');
  const cls=DB.get('classes',[]);const sec=DB.get('sections',{});
  const sts=DB.get('students',[]).filter(s=>s.class===sc&&s.section===ss);
  const fill=(t,s)=>t.replace(/{name}/g,s.name).replace(/{father}/g,s.fatherName||'').replace(/{class}/g,s.class).replace(/{section}/g,s.section).replace(/{date}/g,fmtDate(tod())).replace(/{att}/g,'85').replace(/{hw}/g,'7.2').replace(/{test}/g,'14.5');
  const isDev=isDeveloper(user);

  const syncToFirebase=async(updatedTemps)=>{
    if(!window.db)return;
    try{
      await window.db.collection('rsga_erp').doc('watemps').set({value:updatedTemps,updatedAt:new Date().toISOString()});
    }catch(e){console.warn('Firebase sync error',e);}
  };

  const saveTemps=(updated)=>{
    setTemps(updated);
    DB.set('watemps',updated);
    syncToFirebase(updated);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const saveEdit=(id)=>{
    const updated=temps.map(t=>t.id===id?{...t,name:editName,text:editText}:t);
    saveTemps(updated);
    setSel(null);
  };

  const deleteTemp=(id)=>{
    if(!window.confirm('Is template ko delete karo?'))return;
    const updated=temps.filter(t=>t.id!==id);
    saveTemps(updated);
    if(sel===id)setSel(null);
  };

  const addTemp=()=>{
    if(!newName.trim()||!newText.trim()){alert('Naam aur message dono bharo!');return;}
    const updated=[...temps,{id:'t'+Date.now(),name:newName.trim(),text:newText.trim()}];
    saveTemps(updated);
    setNewName('');setNewText('');setAddMode(false);
  };

  return(
    <div className="fade">
      <div className="g2">
        <div>
          {/* ── Template Manager (Developer only) ── */}

            <div className="section-hdr" style={{justifyContent:'space-between',display:'flex',alignItems:'center'}}>
              <span><i className="fas fa-comment-dots" style={{color:'#25D366'}}/>Message Templates {temps.length>0&&<span className="badge badge-b" style={{marginLeft:'6px'}}>{temps.length}</span>}</span>
              {isDev&&<button className="btn btn-sm btn-primary" onClick={()=>{setAddMode(v=>!v);setSel(null);}} style={{fontSize:'11px'}}><i className="fas fa-plus"/>Add New</button>}
            </div>

            {/* Add new template form - Developer only */}
            {isDev&&addMode&&(
              <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:'10px',padding:'14px',marginBottom:'12px'}}>
                <div style={{fontWeight:'700',fontSize:'13px',marginBottom:'10px',color:'#166534'}}>➕ Naya Template</div>
                <div style={{marginBottom:'8px'}}>
                  <label className="label">Template Naam (e.g. 💰 Fee Reminder)</label>
                  <input className="input" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Template ka naam likho..."/>
                </div>
                <div style={{marginBottom:'10px'}}>
                  <label className="label">Message Text — {'{name}'} {'{father}'} {'{class}'} {'{section}'} {'{date}'} use kar sakte ho</label>
                  <textarea className="input" rows="6" value={newText} onChange={e=>setNewText(e.target.value)} placeholder="Message yahan likho..." style={{resize:'vertical',fontFamily:'inherit',fontSize:'12px',lineHeight:1.6}}/>
                </div>
                <div style={{display:'flex',gap:'8px'}}>
                  <button className="btn btn-primary btn-sm" onClick={addTemp}><i className="fas fa-save"/>Save Template</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setAddMode(false);setNewName('');setNewText('');}}>Cancel</button>
                </div>
              </div>
            )}

            {saved&&<div className="alert alert-s" style={{marginBottom:'10px'}}><i className="fas fa-check-circle"/>✅ Template save ho gaya — sabhi teachers ko visible rahega!</div>}

            {temps.length===0&&(
              <div className="alert alert-w"><i className="fas fa-exclamation-triangle"/>Koi template nahi hai. {isDev?'Upar "+ Add New" se banao.':'Admin se templates banwao.'}</div>
            )}

            <div style={{display:'grid',gap:'8px'}}>
              {temps.map(t=>(
                <div key={t.id} style={{background:'#f8fafc',border:`1.5px solid ${sel===t.id?'var(--blue)':'#e2e8f0'}`,borderRadius:'10px',padding:'12px 14px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}}>
                    <div style={{fontWeight:'700',fontSize:'13px',flex:1,cursor:'pointer'}} onClick={()=>{setSel(sel===t.id?null:t.id);setEditText(t.text);setEditName(t.name);setAddMode(false);}}>{t.name}</div>
                    <div style={{display:'flex',gap:'5px',flexShrink:0}}>
                      {sel===t.id&&<span className="badge badge-b" style={{fontSize:'10px'}}>Selected</span>}
                      {isDev&&<button className="btn btn-xs btn-ghost" title="Edit" onClick={()=>{setSel(t.id);setEditText(t.text);setEditName(t.name);setAddMode(false);}} style={{padding:'3px 7px'}}><i className="fas fa-edit"/></button>}
                      {isDev&&<button className="btn btn-xs btn-danger" title="Delete" onClick={()=>deleteTemp(t.id)} style={{padding:'3px 7px'}}><i className="fas fa-trash"/></button>}
                    </div>

                  <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'4px',lineHeight:1.5,cursor:'pointer'}} onClick={()=>{setSel(sel===t.id?null:t.id);setEditText(t.text);setEditName(t.name);}}>{t.text.substring(0,80)}...</div>
                </div>
              ))}
            </div>
          </div>

          {/* Edit template - Developer only */}
          {isDev&&sel&&(
            <div className="card">
              <div className="section-hdr"><i className="fas fa-edit" style={{color:'var(--blue)'}}/>Template Edit Karo</div>
              <div style={{marginBottom:'8px'}}>

                <input className="input" value={editName} onChange={e=>setEditName(e.target.value)}/>

              <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                <button className="btn btn-primary btn-sm" onClick={()=>saveEdit(sel)}><i className="fas fa-save"/>Save Changes</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setSel(null)}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        <div>
          <div className="card" style={{marginBottom:'14px'}}>
            <div className="section-hdr"><i className="fab fa-whatsapp" style={{color:'#25D366'}}/>Messages Bhejo</div>
            <div className="fx" style={{marginBottom:'12px'}}>
              <div><label className="label">Class</label><select className="select" style={{width:'90px'}} value={sc} onChange={e=>{const c=e.target.value;const ns=accessList===null?(sec[c]||['A1'])[0]:(accessList.find(x=>x.class===c)||{section:'A1'}).section;setSc(c);setSs(ns);}}>{(accessList===null?cls:[...new Set(accessList.map(x=>x.class))]).map(c=><option key={c} value={c}>Cls {c}</option>)}</select></div>
              <div><label className="label">Section</label><select className="select" style={{width:'90px'}} value={ss} onChange={e=>setSs(e.target.value)}>{(accessList===null?(sec[sc]||[]):accessList.filter(x=>x.class===sc).map(x=>x.section)).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            </div>
            {sel?<div className="alert alert-s"><i className="fas fa-check"/>Template selected: {temps.find(t=>t.id===sel)?.name}</div>:
            <div className="alert alert-w"><i className="fas fa-exclamation-triangle"/>Pehle left side se template select karo</div>}
            {sel&&(
              <div style={{marginTop:'12px'}}>
                <div style={{fontSize:'12px',fontWeight:'700',color:'#64748b',marginBottom:'8px'}}>Quick Send — {sts.length} students:</div>
                <div style={{display:'grid',gap:'6px',maxHeight:'350px',overflowY:'auto'}}>
                  {sts.map(s=>{const t=temps.find(x=>x.id===sel);const msg=t?fill(t.text,s):'';return(

                      <span style={{fontSize:'11px',color:'#94a3b8'}}>{s.mobile}</span>
                      <a href={waLink(s.mobile,msg)} className="btn btn-xs btn-wa" style={{textDecoration:'none'}} onClick={e=>{openWA(waLink(s.mobile,msg),e);logComm({type:'whatsapp',teacherName:user.name,teacherId:user.id,studentName:s.name,studentId:s.id,studentClass:s.class,studentSection:s.section,fatherName:s.fatherName||'',mobile:s.mobile||'',templateName:t?.name||'',message:msg.substring(0,300)});}}><i className="fab fa-whatsapp"/>Send</a>
                    </div>
                  );})}
                </div>
              </div>
            )}
          </div>
          <div className="card">
            <div className="section-hdr"><i className="fas fa-pen" style={{color:'var(--blue)'}}/>Custom Message</div>
            <textarea className="input" rows="4" value={customMsg} onChange={e=>setCustomMsg(e.target.value)} placeholder="Custom message likho... {name}, {father}, {class} use kar sakte ho"/>
            {customMsg&&<div style={{marginTop:'10px',display:'grid',gap:'5px',maxHeight:'200px',overflowY:'auto'}}>
              {sts.slice(0,5).map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:'#f8fafc',borderRadius:'6px'}}>
                  <span style={{flex:1,fontSize:'12px'}}>{s.name}</span>
                  <a href={waLink(s.mobile,fill(customMsg,s))} className="btn btn-xs btn-wa" style={{textDecoration:'none'}} onClick={e=>{openWA(waLink(s.mobile,fill(customMsg,s)),e);logComm({type:'whatsapp',teacherName:user.name,teacherId:user.id,studentName:s.name,studentId:s.id,studentClass:s.class,studentSection:s.section,fatherName:s.fatherName||'',mobile:s.mobile||'',templateName:'Custom',message:fill(customMsg,s).substring(0,300)});}}><i className="fab fa-whatsapp"/>Send</a>
                </div>
              ))}
              {sts.length>5&&<p style={{fontSize:'11px',color:'#94a3b8',textAlign:'center'}}>...aur {sts.length-5} students</p>}
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}


// ── TEACHER PROFILE MODAL (4-Tab Unified Control Panel) ──────────────
// Tab 1: Info  Tab 2: Roles  Tab 3: Assignments  Tab 4: Class Teacher
function TeacherProfileModal({usr,currentUser,onSave,onClose,allUsers}){
  const isNew=!usr.id;
  const cls=DB.get('classes',[]);
  const sec=DB.get('sections',{});
  const subs=DB.get('subjects',[]);
  const [tab,setTab]=useState('info');
  const [saving,setSaving]=useState(false);
  const [showPwd,setShowPwd]=useState(false);
  const [saved,setSaved]=useState(false);

  // ── Tab 1: Info state ──
  const [info,setInfo]=useState({
    name:usr.name||'',
    username:usr.username||'',
    mobile:usr.mobile||'',
    password:'',
    qualification:usr.qualification||'',
    employeeId:usr.employeeId||'',
    status:usr.status||'active',
  });
  const ui=(k,v)=>setInfo(p=>({...p,[k]:v}));

  // ── Tab 2: Roles state ──
  const [roles,setRoles]=useState(getRoles(usr).length?getRoles(usr):['subjectteacher']);
  const toggleRole=(r)=>{
    setRoles(p=>{
      if(p.includes(r)){
        if(p.length===1){alert('At least one role is required!');return p;}
        return p.filter(x=>x!==r);
      }
      return[...p,r];
    });
  };

  // ── Tab 3: Assignments state ──
  const [assigns,setAssigns]=useState(()=>DB.get(`assign_${usr.id}`,[]));
  const [addRow,setAddRow]=useState(null); // {class:'',section:'',subject:'',role:'subject'}
  const isAssigned=(c,s)=>assigns.some(a=>a.class===c&&a.section===s);
  const getRow=(c,s)=>assigns.find(a=>a.class===c&&a.section===s);
  const toggleCS=(c,s)=>{
    if(isAssigned(c,s)){setAssigns(p=>p.filter(a=>!(a.class===c&&a.section===s)));}
    else{setAssigns(p=>[...p,{id:'a'+Date.now(),class:c,section:s,subject:subs[0]||'English',role:'subject'}]);}
  };
  const updRow=(c,s,field,val)=>setAssigns(p=>p.map(a=>a.class===c&&a.section===s?{...a,[field]:val,...(field==='role'&&val==='classTeacher'?{subject:'All'}:{})}:a));

  // ── Tab 4: Class Teacher state ──
  const [ctClass,setCtClass]=useState(()=>{
    const a=DB.get(`assign_${usr.id}`,[]).find(x=>x.role==='classTeacher');
    return a?{class:a.class,section:a.section}:{class:usr.class||'',section:usr.section||''};
  });
  const [ctSaving,setCtSaving]=useState(false);

  // ── SAVE handlers ─────────────────────────────────────────────────
  const fbSync=async(key,val)=>{
    try{if(window.db)await window.db.collection('rsga_erp').doc(key).set({value:val,updatedAt:Date.now()});}
    catch(e){console.warn('fbSync:',e);}
  };

  const saveAll=async()=>{
    if(!info.name.trim()||!info.username.trim()){alert('Name and username are required!');return;}
    if(isNew&&!info.password.trim()){alert('Password is required for a new account!');return;}
    if(roles.length===0){alert('At least one role is required!');return;}
    // Class Teacher must have at least one subject assigned
    const ctRow=assigns.find(a=>a.role==='classTeacher');
    if(ctRow&&ctRow.subject!=='All'&&(!ctRow.subjects||ctRow.subjects.length===0)){
      alert('⚠️ Class Teacher must have at least one subject selected!\nPlease go to Assignments tab and select the subject(s) they teach.');return;
    }
    // Username dup check
    const dup=(allUsers||[]).find(u=>u.id!==(usr.id||null)&&u.username?.toLowerCase()===info.username.trim().toLowerCase());
    if(dup){alert('❌ Username already taken by '+dup.name+'!');return;}
    setSaving(true);
    let entry={
      ...(usr.id?usr:{}),
      name:info.name.trim(),
      username:info.username.trim().toLowerCase(),
      mobile:info.mobile,
      qualification:info.qualification,
      employeeId:info.employeeId,
      status:info.status,
      roles,
      role:roles[0],
      class:ctClass.class||'',
      section:ctClass.section||'',
    };
    if(info.password.trim()){
      const h=await hashPassword(info.password.trim());
      entry={...entry,password:h,passwordHash:h};
    } else if(!isNew){
      entry={...entry,password:usr.password,passwordHash:usr.passwordHash};
    }
    if(!isNew){
      // Save assignments
      DB.set(`assign_${usr.id}`,assigns);
      await fbSync(`assign_${usr.id}`,assigns);
    }
    await onSave(entry, info.password.trim()||null, assigns);
    setSaving(false);
  };

  const canEditThis=!isNew?(!isProtected(usr)||isDeveloper(currentUser)):true;
  const isDevUser=isDeveloper(currentUser);

  const tabStyle=(t)=>({
    padding:'9px 14px',cursor:'pointer',fontSize:'12px',fontWeight:'700',
    color:tab===t?'var(--blue)':'#64748b',

          <div style={{width:'48px',height:'48px',borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0}}>
            {isNew?'➕':((ROLES[roles[0]]||{}).icon||'👤')}
          </div>
          <div style={{flex:1}}>
            <div style={{color:'#fff',fontWeight:'900',fontSize:'16px'}}>{isNew?'New Staff Account':usr.name}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'4px'}}>
              {!isNew&&roles.map(r=>{const ri=ROLES[r]||{};return(
                <span key={r} style={{background:'rgba(255,255,255,.18)',color:'#fff',borderRadius:'20px',padding:'1px 8px',fontSize:'10px',fontWeight:'700'}}>{ri.icon} {ri.label}</span>
              );})}
            </div>
            {!isNew&&usr.class&&<div style={{color:'rgba(255,255,255,.6)',fontSize:'11px',marginTop:'2px'}}>📚 Class {usr.class}-{usr.section}</div>}
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',cursor:'pointer',width:'30px',height:'30px',borderRadius:'8px',fontSize:'16px',color:'#fff'}}>✕</button>
        </div>

        {/* ── Tabs ── */}

            ]:[])
          ].map(t=>(
            <div key={t.id} style={tabStyle(t.id)} onClick={()=>setTab(t.id)}>
              <i className={`fas ${t.icon}`} style={{marginRight:'5px',fontSize:'11px'}}/>{t.label}

        {!isNew&&isProtected(usr)&&!isDevUser&&(

        )}

                })}
              </div>

              {isDevUser&&(
                <>
                  <div className="section-hdr" style={{marginBottom:'10px'}}>⚠️ Admin / Dev Roles (Developer Only)</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                    {['developer','md_sir','principal','vice_principal'].map(r=>{
                      const ri=ROLES[r]||{};const sel=roles.includes(r);
                      return(
                        <div key={r} onClick={()=>toggleRole(r)} style={{
                          display:'flex',alignItems:'center',gap:'7px',padding:'8px 12px',
                          borderRadius:'10px',cursor:'pointer',userSelect:'none',transition:'all .15s',
                          border:`2px solid ${sel?ri.color||'#0f172a':'#e2e8f0'}`,
                          background:sel?(ri.bg||'#f1f5f9'):'#f8fafc',
                          color:sel?(ri.color||'#0f172a'):'#94a3b8',fontWeight:'700',fontSize:'11px'
                        }}>
                          <span>{ri.icon}</span><span>{ri.label}</span>
                          {sel&&<i className="fas fa-check-circle" style={{fontSize:'11px'}}/>}
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {/* Role Permission Preview */}
              <div style={{marginTop:'16px',background:'#f8fafc',borderRadius:'10px',padding:'12px',border:'1.5px solid #e2e8f0'}}>
                <div style={{fontSize:'11px',fontWeight:'700',color:'#475569',marginBottom:'8px'}}>📋 Selected Roles → Page Access</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                  {Array.from(new Set(roles.flatMap(r=>ROLE_ACCESS[r]||[]))).map(p=>(
                    <span key={p} style={{background:'#dbeafe',color:'#1e40af',borderRadius:'5px',padding:'2px 7px',fontSize:'10px',fontWeight:'600'}}>{p}</span>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ════ TAB 3: ASSIGNMENTS ════ */}
          {tab==='assign'&&!isNew&&(
            <div className="fade">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}}>
                <span style={{fontSize:'12px',fontWeight:'700',color:'#475569'}}>{assigns.length} class{assigns.length!==1?'es':''} assigned</span>
                {assigns.length>0&&<button className="btn btn-xs btn-danger" onClick={()=>{if(confirm('Saari assignments hatayein?'))setAssigns([]);}}><i className="fas fa-trash"/>Clear All</button>}
              </div>

              {cls.map(c=>{
                const sections=sec[c]||[];
                if(!sections.length)return null;
                return(
                  <div key={c} style={{marginBottom:'12px'}}>
                    <div style={{background:'var(--navy)',color:'#fff',borderRadius:'7px 7px 0 0',padding:'5px 12px',fontSize:'12px',fontWeight:'800'}}>Class {c}</div>
                    <div style={{border:'1.5px solid #e2e8f0',borderTop:'none',borderRadius:'0 0 7px 7px',overflow:'hidden'}}>
                      {sections.map((s,idx)=>{
                        const assigned=isAssigned(c,s);
                        const row=getRow(c,s);
                        return(
                          <div key={s} style={{display:'flex',alignItems:'center',gap:'8px',padding:'9px 12px',background:assigned?'#f0fdf4':'#fff',borderTop:idx?'1px solid #f1f5f9':'none',flexWrap:'wrap'}}>
                            <div onClick={()=>toggleCS(c,s)} style={{width:'28px',height:'28px',borderRadius:'7px',flexShrink:0,cursor:'pointer',
                              background:assigned?'#16a34a':'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'12px',transition:'all .15s'}}>
                              {assigned?<i className="fas fa-check"/>:<i className="fas fa-plus" style={{color:'#94a3b8'}}/>}
                            </div>
                            <div style={{fontWeight:'800',fontSize:'13px',minWidth:'50px',color:assigned?'#166534':'#94a3b8'}}>{c}-{s}</div>
                            {assigned&&row&&(
                              <div style={{flex:1,minWidth:'150px',display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'}}>
                                <select className="select" value={row.role} onChange={e=>updRow(c,s,'role',e.target.value)}
                                  style={{fontSize:'11px',padding:'4px 7px',flex:'0 0 auto',width:'140px',background:row.role==='classTeacher'?'#dbeafe':'#dcfce7',borderColor:row.role==='classTeacher'?'#93c5fd':'#86efac',color:row.role==='classTeacher'?'#1e40af':'#166534',fontWeight:'700'}}>
                                  <option value="classTeacher">🏫 Class Teacher</option>
                                  <option value="subject">📚 Subject Teacher</option>
                                </select>
                                {row.role==='classTeacher'&&(
                                  <div style={{flex:1,minWidth:'200px'}}>
                                    <div style={{fontSize:'10px',color:'#64748b',fontWeight:'700',marginBottom:'4px'}}>Subjects this CT can EDIT <span style={{color:'#dc2626'}}>*</span> (select at least 1):</div>
                                    <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                                      {subs.map(sub=>{
                                        const selSubs=row.subjects||[];
                                        const isSel=selSubs.includes(sub);
                                        return(
                                          <div key={sub} onClick={()=>{
                                            const cur=row.subjects||[];
                                            const next=cur.includes(sub)?cur.filter(x=>x!==sub):[...cur,sub];
                                            updRow(c,s,'subjects',next);
                                          }} style={{
                                            padding:'3px 8px',borderRadius:'6px',fontSize:'10px',fontWeight:'700',cursor:'pointer',userSelect:'none',transition:'all .1s',
                                            background:isSel?'#1d4ed8':'#f1f5f9',color:isSel?'#fff':'#64748b',border:`1.5px solid ${isSel?'#1d4ed8':'#e2e8f0'}`
                                          }}>{sub}</div>
                                        );
                                      })}
                                    </div>
                                    {(!row.subjects||row.subjects.length===0)&&<div style={{fontSize:'10px',color:'#dc2626',marginTop:'4px',fontWeight:'700'}}>⚠️ No subject selected — CT cannot edit any marks!</div>}
                                  </div>
                                )}
                                {row.role!=='classTeacher'&&(
                                  <select className="select" value={row.subject} onChange={e=>updRow(c,s,'subject',e.target.value)} style={{fontSize:'11px',padding:'4px 7px',flex:1}}>
                                    <option value="All">All Subjects</option>
                                    {subs.map(sub=><option key={sub} value={sub}>{sub}</option>)}
                                  </select>
                                )}
                              </div>
                            )}
                            {!assigned&&<span style={{fontSize:'11px',color:'#cbd5e1',fontStyle:'italic'}}>Tap ✚ to assign</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ════ TAB 4: CLASS TEACHER ════ */}
          {tab==='ct'&&!isNew&&(()=>{
            const ctAssign=assigns.find(a=>a.role==='classTeacher');
            // Who is current CT of ctClass?
            const conflict=ctClass.class&&ctClass.section
              ?DB.get('users',[]).find(u=>{
                if(u.id===usr.id)return false;
                const a=DB.get(`assign_${u.id}`,[]);
                return a.some(x=>x.class===ctClass.class&&x.section===ctClass.section&&x.role==='classTeacher')
                  ||(u.class===ctClass.class&&u.section===ctClass.section&&getRoles(u).includes('classteacher'));
              })
              :null;
            const sections=ctClass.class?(sec[ctClass.class]||[]):[];
            return(
              <div className="fade">
                {/* Current status */}
                <div style={{background:ctAssign?'linear-gradient(135deg,#f0fdf4,#dcfce7)':'linear-gradient(135deg,#fef2f2,#fee2e2)',border:`2px solid ${ctAssign?'#86efac':'#fca5a5'}`,borderRadius:'12px',padding:'14px 16px',marginBottom:'16px'}}>
                  <div style={{fontWeight:'800',fontSize:'13px',color:ctAssign?'#166534':'#991b1b',marginBottom:'4px'}}>
                    {ctAssign?`✅ Currently: Class Teacher for Class ${ctAssign.class}-${ctAssign.section}`:'⚠️ No Class Teacher assignment found'}
                  </div>
                  {ctAssign&&(
                    <button className="btn btn-xs btn-danger" style={{marginTop:'6px'}} onClick={()=>{
                      setAssigns(p=>p.filter(a=>a.role!=='classTeacher'));
                      setCtClass({class:'',section:''});
                    }}><i className="fas fa-times"/>Remove CT Assignment</button>
                  )}
                </div>

                {/* Assign new */}
                <div className="section-hdr" style={{marginBottom:'12px'}}>Naya Class Teacher Assignment</div>
                <div className="g2" style={{gap:'12px',marginBottom:'12px'}}>
                  <div><label className="label">Class</label>
                    <select className="select" value={ctClass.class} onChange={e=>setCtClass({class:e.target.value,section:''})}>
                      <option value="">— Select Class —</option>
                      {cls.map(c=><option key={c} value={c}>Class {c}</option>)}
                    </select>
                  </div>
                  <div><label className="label">Section</label>
                    <select className="select" value={ctClass.section} onChange={e=>setCtClass(p=>({...p,section:e.target.value}))}>
                      <option value="">— Select Section —</option>
                      {sections.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>

                {/* Conflict warning */}
                {conflict&&(
                  <div className="alert alert-w" style={{marginBottom:'12px'}}>
                    <i className="fas fa-exclamation-triangle"/>
                    <div><strong>{conflict.name}</strong> already is Class {ctClass.class}-{ctClass.section} ke CT. Save karne pe replace ho jayega.</div>
                  </div>
                )}

                {ctClass.class&&ctClass.section&&(
                  <button className="btn btn-primary btn-sm" onClick={()=>{
                    // Remove existing CT role from assigns, add new one
                    const existing=assigns.filter(a=>a.role!=='classTeacher');
                    setAssigns([...existing,{id:'a_ct_'+Date.now(),class:ctClass.class,section:ctClass.section,subject:'All',role:'classTeacher'}]);
                    setSaved('ct');setTimeout(()=>setSaved(false),2500);
                  }}>
                    <i className="fas fa-check"/>Set as CT — Class {ctClass.class}-{ctClass.section}
                  </button>
                )}
                {saved==='ct'&&<div className="alert alert-s" style={{marginTop:'10px'}}><i className="fas fa-check-circle"/>Set! Neeche "Save & Sync" dabayein.</div>}
                <div className="alert alert-i" style={{marginTop:'12px',fontSize:'11px'}}><i className="fas fa-info-circle"/>Changes save karne ke liye neeche "Save & Sync" button dabayein.</div>
              </div>
            );
          })()}

        </div>{/* end scrollable area */}

        {/* ── Footer buttons ── */}
        <div style={{padding:'14px 22px',borderTop:'1px solid #e2e8f0',display:'flex',gap:'8px',justifyContent:'flex-end',background:'#fafafa'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-success" onClick={saveAll} disabled={saving||(!canEditThis&&!isNew)}>
            {saving?<><i className="fas fa-spinner spin"/>Saving...</>:<><i className="fas fa-cloud-upload-alt"/>{isNew?'Create & Sync':'Save & Sync'}</>}
          </button>
        </div>

      </div>
    </div>
  );
}

// ── TEACHERS ─────────────────────────────────────────────────────────
function Teachers({user}){
  const canEdit=isAdmin(user);
  const[usrs,setUsrs]=useState(DB.get('users',[]));
  const[profileUser,setProfileUser]=useState(null);
  const[syncMsg,setSyncMsg]=useState('');
  const[pendingCreds,setPendingCreds]=useState(null);
  const[searchQ,setSearchQ]=useState('');

  const appUrl=window.location.href.split('?')[0].replace(/#.*/,'');

  const fbSync=async(key,val)=>{
    try{if(window.db)await window.db.collection('rsga_erp').doc(key).set({value:val,updatedAt:Date.now()});}
    catch(e){console.warn('fbSync failed',e);}
  };

  const credWAMsg=(u,plainPwd)=>{
    const assigns=DB.get(`assign_${u.id}`,[]);
    const roles=getRoles(u).map(r=>ROLES[r]?.label||r).join(', ');
    const classInfo=assigns.length
      ? assigns.map(a=>`Class ${a.class}-${a.section}${a.subject&&a.subject!=='All'?' ('+a.subject+')':''}`).join(', ')
      : (u.class?`Class ${u.class}-${u.section}`:'—');
    return `🏫 *R.S. Global Academy, Jirauli, Mainpuri*\n\n👨‍🏫 *ERP Login Details / लॉगिन विवरण*\n\nनमस्कार *${u.name}* जी,\nआपका ERP account तैयार है।\n\n👤 Username: *${u.username}*\n🔑 Password: *${plainPwd}*\n🎭 Role: *${roles}*\n📚 Classes: *${classInfo}*\n\n🌐 *Login Link:*\n${appUrl}\n\n📱 App Install: Same link → Menu (⋮) → "Add to Home Screen"\n\n⚠️ अपना password किसी को न बताएं।\n\nधन्यवाद 🙏\n*R.S. Global Academy*`;
  };

  const assignWAMsg=(u)=>{
    const assigns=DB.get(`assign_${u.id}`,[]);
    const roles=getRoles(u).map(r=>ROLES[r]?.label||r).join(' | ');
    let lines=`🏫 *R.S. Global Academy*\n\n📋 *Assignment Summary*\n*${u.name}* jee\nRole: *${roles}*\n\n`;
    if(assigns.length===0){lines+='❌ No class assigned currently.';}
    else{
      const ct=assigns.filter(a=>a.role==='classTeacher');
      const st=assigns.filter(a=>a.role!=='classTeacher');
      if(ct.length)lines+='🏫 *Class Teacher:*\n'+ct.map(a=>`• Class ${a.class}-${a.section}`).join('\n')+'\n\n';
      if(st.length)lines+='📚 *Subject Teacher:*\n'+st.map(a=>`• Class ${a.class}-${a.section} — ${a.subject}`).join('\n');
    }
    lines+='\n\n🙏 R.S. Global Academy, Jirauli, Mainpuri';
    return lines;
  };

  const reloadUsers=()=>{setUsrs(DB.get('users',[]));};

  const del=async(id)=>{
    const target=usrs.find(u=>u.id===id);
    if(isProtected(target)){alert('❌ Developer account cannot be deleted!');return;}
    if(!isMDSir(user)){alert('Only MD Sir can delete staff!');return;}
    if(!confirm('Are you sure?'))return;
    const a=DB.get('users',[]).filter(u=>u.id!==id);
    DB.set('users',a);setUsrs(a);
    await fbSync('users',a);
  };

  // Save/update a teacher profile
  const saveProfile=async(updated,plainPwd)=>{
    let list=DB.get('users',[]);
    const isNew=!updated.id;
    if(isNew)updated.id='u'+Date.now();
    // Ensure roles array
    if(!Array.isArray(updated.roles)||updated.roles.length===0)updated.roles=[updated.role||'subjectteacher'];
    updated.role=updated.roles[0]; // keep legacy field in sync
    // Username dup check
    const dup=list.find(u=>u.id!==updated.id&&u.username?.toLowerCase()===updated.username?.toLowerCase());
    if(dup){alert('❌ Username already taken by '+dup.name+'!');return;}
    list=isNew?[...list,updated]:list.map(u=>u.id===updated.id?updated:u);
    DB.set('users',list);setUsrs(list);
    // Auto-set classTeacher assignment if has classteacher role + class/section
    if(updated.roles.includes('classteacher')&&updated.class&&updated.section){
      const ak='assign_'+updated.id;
      const ex=DB.get(ak,[]);
      const hasCtAssign=ex.some(a=>a.class===updated.class&&a.section===updated.section&&a.role==='classTeacher');
      if(!hasCtAssign){
        const nex=[...ex,{id:'a_auto_'+Date.now(),class:updated.class,section:updated.section,subject:'All',role:'classTeacher'}];
        DB.set(ak,nex);
        await fbSync('assign_'+updated.id,nex);
      }
    }
    setSyncMsg('⏳ Syncing...');
    await fbSync('users',list);
    setSyncMsg('✅ Saved & synced to all devices!');
    if(isNew&&plainPwd)setPendingCreds({user:updated,plainPwd});
    setProfileUser(null);
    setTimeout(()=>setSyncMsg(''),5000);
  };


  const filteredUsrs=[...usrs].filter(u=>
    !searchQ||u.name.toLowerCase().includes(searchQ.toLowerCase())||u.username?.toLowerCase().includes(searchQ.toLowerCase())
  ).sort((a,b)=>a.name.localeCompare(b.name));

  // Role-based grouped display
  const adminUsers=filteredUsrs.filter(u=>getRoles(u).some(r=>['developer','md_sir','principal','vice_principal','incharge'].includes(r)));
  const teacherUsers=filteredUsrs.filter(u=>!getRoles(u).some(r=>['developer','md_sir','principal','vice_principal','incharge','md_primary','md_middle','md_senior'].includes(r)));
  const mdOpUsers=filteredUsrs.filter(u=>getRoles(u).some(r=>['md_primary','md_middle','md_senior'].includes(r)));

  const StaffCard=({u})=>{
    const roles=getRoles(u);
    const ri=ROLES[getPrimaryRole(u)]||{};
    const assignCnt=DB.get(`assign_${u.id}`,[]).length;
    const ctAssign=DB.get(`assign_${u.id}`,[]).find(a=>a.role==='classTeacher');
    return(
      <div style={{
        display:'flex',alignItems:'center',gap:'12px',padding:'13px 16px',
        background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:'12px',
        flexWrap:'wrap',transition:'box-shadow .15s,border-color .15s',cursor:'pointer'
      }}
        onClick={()=>setProfileUser(u)}
        onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)';e.currentTarget.style.boxShadow='0 4px 16px rgba(46,117,182,.12)';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='none';}}
      >
        <div style={{width:'44px',height:'44px',borderRadius:'50%',background:ri.color||'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}}>{ri.icon||'👤'}</div>
        <div style={{flex:1,minWidth:'130px'}}>
          <div style={{fontWeight:'800',fontSize:'14px',color:'#1e293b'}}>{u.name}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'3px',margin:'3px 0'}}>
            {roles.map(r=><span key={r} style={{fontSize:'9px',background:(ROLES[r]||{}).bg||'#f1f5f9',color:(ROLES[r]||{}).color||'#475569',borderRadius:'5px',padding:'2px 6px',fontWeight:'700'}}>{(ROLES[r]||{}).icon} {(ROLES[r]||{}).label||r}</span>)}
          </div>
          <div style={{fontSize:'11px',color:'#64748b'}}>@{u.username||'—'}{u.mobile&&<span style={{marginLeft:'8px'}}>📱 {u.mobile}</span>}</div>
          {ctAssign&&<div style={{fontSize:'10px',color:'#1e40af',marginTop:'1px',fontWeight:'700'}}>🏫 CT: Class {ctAssign.class}-{ctAssign.section}</div>}
          {!ctAssign&&u.class&&<div style={{fontSize:'10px',color:'var(--blue)',marginTop:'1px'}}>📚 Class {u.class}-{u.section}</div>}
          {assignCnt>0&&<div style={{fontSize:'10px',color:'#16a34a',marginTop:'1px'}}>✅ {assignCnt} class{assignCnt!==1?'es':''} assigned</div>}
        </div>
        <div style={{display:'flex',gap:'5px',alignItems:'center'}}>
          {u.mobile&&(
            <a href={`https://wa.me/91${u.mobile}?text=${encodeURIComponent(assignWAMsg(u))}`}
              className="btn btn-xs btn-wa" style={{textDecoration:'none'}}
              onClick={e=>{e.stopPropagation();openWA(`https://wa.me/91${u.mobile}?text=${encodeURIComponent(assignWAMsg(u))}`,e);}}>
              <i className="fab fa-whatsapp"/>
            </a>
          )}
          {canEdit&&!isProtected(u)&&isMDSir(user)&&(
            <button className="btn btn-xs btn-danger" onClick={e=>{e.stopPropagation();del(u.id);}} title="Delete"><i className="fas fa-trash"/></button>
          )}
          {isProtected(u)&&<span className="badge badge-p" style={{fontSize:'9px'}}>🛠️</span>}
          <i className="fas fa-chevron-right" style={{color:'#cbd5e1',fontSize:'11px'}}/>
        </div>
      </div>
    );
  };

  const SectionHead=({icon,label,count})=>(
    <div style={{display:'flex',alignItems:'center',gap:'8px',margin:'16px 0 8px',paddingBottom:'6px',borderBottom:'2px solid #e2e8f0'}}>
      <span style={{fontSize:'14px'}}>{icon}</span>
      <span style={{fontWeight:'800',fontSize:'13px',color:'#1e293b'}}>{label}</span>
      <span className="badge badge-b" style={{fontSize:'10px'}}>{count}</span>
    </div>
  );

  return(
    <div className="fade">
      {syncMsg&&(
        <div className="card" style={{marginBottom:'12px',background:syncMsg.startsWith('✅')?'#f0fdf4':'#fef3c7',border:`1.5px solid ${syncMsg.startsWith('✅')?'#86efac':'#fde68a'}`}}>
          <div style={{fontWeight:'700',fontSize:'13px',color:syncMsg.startsWith('✅')?'#166534':'#92400e'}}>{syncMsg}</div>
        </div>
      )}

      {pendingCreds&&(
        <div style={{background:'linear-gradient(135deg,#dcfce7,#d1fae5)',border:'2px solid #86efac',borderRadius:'12px',padding:'14px 18px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'14px',flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:'800',fontSize:'14px',color:'#166534'}}><i className="fas fa-check-circle" style={{marginRight:'6px'}}/>Account Ready — {pendingCreds.user.name}</div>
            <div style={{fontSize:'12px',color:'#15803d',marginTop:'3px'}}>
              The teacher can now log in using their mobile number: <b>{pendingCreds.user.mobile||pendingCreds.user.username}</b>.
              They will be prompted to set their own username and password on first login.
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            <a href={`https://wa.me/91${pendingCreds.user.mobile||''}?text=${encodeURIComponent(assignWAMsg(pendingCreds.user))}`}
              className="btn btn-wa btn-sm" style={{textDecoration:'none',background:'#075e54'}}
              onClick={e=>openWA(`https://wa.me/91${pendingCreds.user.mobile||''}?text=${encodeURIComponent(assignWAMsg(pendingCreds.user))}`,e)}>
              <i className="fab fa-whatsapp"/>Send Assignment Info
            </a>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPendingCreds(null)}><i className="fas fa-times"/>Dismiss</button>
          </div>
        </div>
      )}

      {/* ── Header + Search + Add ── */}
      <div className="card" style={{marginBottom:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}}>
          <div>
            <div style={{fontWeight:'900',fontSize:'16px',color:'#1e293b'}}>👥 Staff Management</div>
            <div style={{fontSize:'12px',color:'#64748b',marginTop:'2px'}}>{usrs.length} staff members · Click on a profile to manage everything</div>
          </div>
          {canEdit&&<button className="btn btn-success btn-sm" onClick={()=>setProfileUser({})}><i className="fas fa-plus"/>New Staff</button>}
        </div>
        <input className="input" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Search by name or username..." style={{fontSize:'13px'}}/>
      </div>

      {/* ── Admin & Management ── */}
      {adminUsers.length>0&&(
        <>
          <SectionHead icon="🏛️" label="Admin & Management" count={adminUsers.length}/>
          <div style={{display:'grid',gap:'8px',marginBottom:'8px'}}>
            {adminUsers.map(u=><StaffCard key={u.id} u={u}/>)}
          </div>
        </>
      )}

      {/* ── Teachers ── */}
      {teacherUsers.length>0&&(
        <>
          <SectionHead icon="👨‍🏫" label="Teachers" count={teacherUsers.length}/>
          <div style={{display:'grid',gap:'8px',marginBottom:'8px'}}>
            {teacherUsers.map(u=><StaffCard key={u.id} u={u}/>)}
          </div>
        </>
      )}

      {/* ── MD Operators ── */}
      {mdOpUsers.length>0&&(
        <>
          <SectionHead icon="⭐" label="MD Sir Test Operators" count={mdOpUsers.length}/>
          <div style={{display:'grid',gap:'8px'}}>
            {mdOpUsers.map(u=><StaffCard key={u.id} u={u}/>)}
          </div>
        </>
      )}

      {filteredUsrs.length===0&&(
        <div className="card"><div className="nodata"><i className="fas fa-search"/><p>No staff found</p></div></div>
      )}

      {/* ── APPROVAL CENTER — VP + Developer only ── */}
      {(isDeveloper(user)||isVicePrincipal(user)||isAdmin(user))&&(
        <div style={{marginTop:'20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',paddingBottom:'6px',borderBottom:'2px solid #e2e8f0'}}>
            <span style={{fontSize:'14px'}}>📩</span>
            <span style={{fontWeight:'800',fontSize:'13px',color:'#1e293b'}}>Approval Center</span>
            {(()=>{
              const pTR=DB.get('teacher_requests',[]).filter(r=>r.status==='pending').length;
              const pRR=DB.get('role_requests',[]).filter(r=>r.status==='pending').length;
              const pXR=DB.get('transfer_requests',[]).filter(r=>r.status==='pending').length;
              const tot=pTR+pRR+pXR;
              return tot>0?<span className="badge badge-r" style={{fontSize:'10px'}}>{tot} pending</span>:null;
            })()}
          </div>
          <RequestsPanel user={user}/>
        </div>
      )}

      {/* ── NEW TEACHER REQUEST — for non-logged-in / guest — shown on login page already */}
      {/* ── SUBJECT / CLASS ASSIGNMENT REQUEST — for regular teachers ── */}
      {!isDeveloper(user)&&!isAdmin(user)&&!isVicePrincipal(user)&&(
        <div style={{marginTop:'20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',paddingBottom:'6px',borderBottom:'2px solid #e2e8f0'}}>
            <span style={{fontSize:'14px'}}>📋</span>
            <span style={{fontWeight:'800',fontSize:'13px',color:'#1e293b'}}>My Requests</span>
          </div>
          <RoleRequestPanel user={user}/>
        </div>
      )}

      {/* ── UNIFIED TEACHER PROFILE MODAL ── */}
      {profileUser!==null&&(
        <TeacherProfileModal
          usr={profileUser}
          currentUser={user}
          onSave={saveProfile}
          onClose={()=>setProfileUser(null)}
          allUsers={usrs}
        />
      )}
    </div>
  );
}


// ── SESSION MANAGEMENT ────────────────────────────────────────────────
function Session({user}){
  const school=DB.get('school',{session:'2026-27'});
  const sts=DB.get('students',[]);const cls=DB.get('classes',[]);
  const[tab,setTab]=useState('info');
  const promote=()=>{
    if(!confirm('⚠️ Are you sure? All students will be promoted one class!'))return;
    if(!confirm('FINAL CONFIRM: This cannot be undone!'))return;
    const maxCls=12;
    const promoted=sts.map(s=>{
      const nc=parseInt(s.class)+1;
      if(nc>maxCls)return null; // Graduate
      return{...s,class:String(nc)};
    }).filter(Boolean);
    DB.set('students',promoted);
    const ns=school.session?school.session.split('-').map((y,i)=>i?String(parseInt(y)+1):String(parseInt(y)+1)).join('-'):'2026-27';
    DB.set('school',{...school,session:ns});
    alert(`✅ Done! ${sts.length-promoted.length} students graduated. Session updated to ${ns}`);
    window.location.reload();
  };
  const backup=()=>{const data=DB.exportAll();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`rsga_backup_${tod()}.json`;a.click();};
  const restore=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(DB.importAll(d)){alert('✅ Data restored!');window.location.reload();}else alert('❌ Restore failed!');}catch{alert('❌ Invalid file!');}};r.readAsText(f);};
  if(!isAdmin(user))return<div className="card"><div className="alert alert-e"><i className="fas fa-lock"/>Only MD Sir and Principal can manage sessions.</div></div>;
  return(
    <div className="fade">
      <div className="tab-bar">
        <div className={`tab ${tab==='info'?'active':''}`} onClick={()=>setTab('info')}>ℹ️ School Info</div>
        <div className={`tab ${tab==='promote'?'active':''}`} onClick={()=>setTab('promote')}>⬆️ Mass Promotion</div>
        <div className={`tab ${tab==='backup'?'active':''}`} onClick={()=>setTab('backup')}>💾 Backup</div>
      </div>
      {tab==='info'&&<SchoolInfo/>}
      {tab==='promote'&&(
        <div className="card">
          <div className="section-hdr"><i className="fas fa-sync" style={{color:'#d97706'}}/>Mass Promotion</div>
          <div className="alert alert-w" style={{marginBottom:'16px'}}><i className="fas fa-exclamation-triangle"/>This will promote all students to the next class. This cannot be undone!</div>
          <div className="g3" style={{marginBottom:'16px'}}>
            {cls.map(c=><div key={c} style={{background:'#f8fafc',borderRadius:'8px',padding:'10px',textAlign:'center',border:'1px solid #e2e8f0'}}>
              <div style={{fontSize:'20px',fontWeight:'900'}}>→</div>
              <div style={{fontWeight:'700'}}>Class {c}</div>
              <div style={{fontSize:'12px',color:'#64748b'}}>{sts.filter(s=>s.class===c).length} students</div>
              <div style={{fontSize:'11px',color:'var(--blue)',marginTop:'2px'}}>→ Class {parseInt(c)+1<=12?parseInt(c)+1:'Graduate'}</div>
            </div>)}
          </div>
          {isMDSir(user)?<button className="btn btn-danger" onClick={promote}><i className="fas fa-sync"/>Promote All Students</button>:<div className="alert alert-i"><i className="fas fa-info-circle"/>Only MD Sir can perform mass promotion.</div>}
        </div>
      )}
      {tab==='backup'&&(
        <div className="g2">
          <div className="card">
            <div className="section-hdr"><i className="fas fa-download" style={{color:'#16a34a'}}/>Export Backup</div>
            <p style={{fontSize:'13px',color:'#64748b',marginBottom:'14px'}}>Download all school data as a JSON backup.</p>
            <button className="btn btn-success" onClick={backup}><i className="fas fa-download"/>Download Backup</button>
          </div>
          <div className="card">
            <div className="section-hdr"><i className="fas fa-upload" style={{color:'#d97706'}}/>Restore Backup</div>
            <p style={{fontSize:'13px',color:'#64748b',marginBottom:'14px'}}>Restore from a previously saved JSON backup.</p>
            <label className="btn btn-warning" style={{cursor:'pointer'}}><i className="fas fa-upload"/>Choose File<input type="file" accept=".json" style={{display:'none'}} onChange={restore}/></label>
          </div>
        </div>
      )}
    </div>
  );
}
