// ── TIMETABLE ────────────────────────────────────────────────────────
function Timetable({user}){
  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const PERIODS=[1,2,3,4,5,6,7,8];
  const PERIOD_TIMES=['8:00-8:45','8:45-9:30','9:30-10:15','10:15-10:30','10:30-11:15','11:15-12:00','12:00-12:45','12:45-1:30'];
  const canEdit=isMDSir(user)||isPrincipal(user)||isIncharge(user)||user.role==='developer';
  const cls=DB.get('classes',[]);
  const sec=DB.get('sections',{});
  const accessList=getAccessibleCS(user);
  const defC=getDefClass(user)||(accessList===null?(cls[0]||'8'):(accessList[0]||{class:'8'}).class);
  const defS=getDefSection(user)||(accessList===null?((sec[defC]||[])[0]||'A1'):(accessList[0]||{section:'A1'}).section);
  const[sc,setSc]=useState(defC);
  const[ss,setSs]=useState(defS);
  const[view,setView]=useState('class'); // 'class' | 'teacher' | 'mytt'
  const[editing,setEditing]=useState(null); // {day,period}
  const[editVal,setEditVal]=useState({subject:'',teacher:'',room:''});
  const[saved,setSaved]=useState(false);
  const users=DB.get('users',[]);
  const subjects=DB.get('subjects',[]);
  const today=DAYS[new Date().getDay()-1]||'Monday';

  const ttKey=`timetable_${sc}_${ss}`;
  const[tt,setTt]=useState(()=>DB.get(ttKey,{}));

  useEffect(()=>{const d=DB.get(ttKey,{});setTt(d);},[sc,ss]);

  const getCell=(day,period)=>tt[`${day}_${period}`]||{subject:'',teacher:'',room:''};
  const setCell=(day,period,val)=>{
    const newTt={...tt,[`${day}_${period}`]:val};
    setTt(newTt);DB.set(ttKey,newTt);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const subjectColors={
    'English':'#0f766e','Hindi':'#dc2626','Maths':'#1d4ed8','Science':'#7c3aed',
    'S.St.':'#d97706','Social Science':'#d97706','Computer':'#0891b2',
    'Sanskrit':'#c2410c','Drawing':'#db2777','P.T.':'#16a34a','G.K.':'#64748b',
    'Physics':'#4f46e5','Chemistry':'#b45309','Biology':'#15803d',
  };
  const getColor=(sub)=>{
    if(!sub)return'#e2e8f0';
    const match=Object.keys(subjectColors).find(k=>sub.toLowerCase().includes(k.toLowerCase()));
    return match?subjectColors[match]:'#64748b';
  };

  // Teacher-wise timetable
  const[selTeacher,setSelTeacher]=useState('');
  const getTeacherTT=()=>{
    if(!selTeacher)return[];
    const result=[];
    const allCls=accessList===null?cls:[...new Set(accessList.map(x=>x.class))];
    allCls.forEach(c=>{
      (accessList===null?(sec[c]||[]):accessList.filter(x=>x.class===c).map(x=>x.section)).forEach(s=>{
        const key=`timetable_${c}_${s}`;const ttd=DB.get(key,{});
        DAYS.forEach(day=>{PERIODS.forEach(p=>{
          const cell=ttd[`${day}_${p}`]||{};
          if(cell.teacher===selTeacher)result.push({day,period:p,subject:cell.subject,class:c,section:s,room:cell.room||'',time:PERIOD_TIMES[p-1]});
        });});
      });
    });
    return result.sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||a.period-b.period);
  };

  // Export timetable to Excel
  const exportTT=()=>{
    const wb=XLSX.utils.book_new();
    const hdr=['Period/Time',...DAYS];
    const rows=PERIODS.map((p,i)=>{
      return[`P${p} (${PERIOD_TIMES[i]})`,...DAYS.map(d=>{const c=getCell(d,p);return c.subject?`${c.subject}${c.teacher?'\n'+c.teacher:''}${c.room?'\nRoom:'+c.room:''}`:'—';})];
    });
    const ws=XLSX.utils.aoa_to_sheet([
      [`R.S. GLOBAL ACADEMY — TIMETABLE   Class ${sc}-${ss}`,'','','','','',''],
      [`Session: ${DB.get('school',{session:'2026-27'}).session}`,'','','','','',''],
      ['','','','','','',''],
      hdr,...rows
    ]);
    ws['!cols']=[{wch:18},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws,`Class ${sc}-${ss}`);
    XLSX.writeFile(wb,`RSGA_Timetable_${sc}-${ss}.xlsx`);
  };

  return(
    <div className="fade">
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1d4ed8,#3b82f6)',borderRadius:'12px',padding:'14px 18px',marginBottom:'14px',color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <div>
          <div style={{fontWeight:'900',fontSize:'16px'}}>📅 Timetable</div>
          <div style={{fontSize:'12px',color:'rgba(255,255,255,.75)',marginTop:'2px'}}>Class Schedule Management</div>
        </div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {['class','teacher'].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?'rgba(255,255,255,.25)':'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.3)',borderRadius:'8px',padding:'5px 12px',color:'#fff',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>
              {v==='class'?'🏫 Class-wise':'👤 Teacher-wise'}
            </button>
          ))}
          {saved&&<span style={{background:'#22c55e',borderRadius:'8px',padding:'5px 10px',fontSize:'11px',fontWeight:'700'}}>✅ Saved!</span>}
        </div>
      </div>

      {/* Class-wise View */}
      {view==='class'&&(
        <div className="card">
          {/* Selectors */}
          <div style={{display:'flex',gap:'8px',alignItems:'center',marginBottom:'14px',flexWrap:'wrap'}}>
            <div><label className="label">Class</label>
              <select className="select" style={{width:'90px'}} value={sc} onChange={e=>{const c=e.target.value;setSc(c);setSs((accessList===null?(sec[c]||['A1'])[0]:(accessList.find(x=>x.class===c)||{section:'A1'}).section));setEditing(null);}}>
                {(accessList===null?cls:[...new Set(accessList.map(x=>x.class))]).map(c=><option key={c} value={c}>Class {c}</option>)}
              </select>
            </div>
            <div><label className="label">Section</label>
              <select className="select" style={{width:'90px'}} value={ss} onChange={e=>{setSs(e.target.value);setEditing(null);}}>
                {(accessList===null?(sec[sc]||[]):accessList.filter(x=>x.class===sc).map(x=>x.section)).map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
              <button className="btn btn-sm" style={{background:'#16a34a',color:'#fff',border:'none'}} onClick={exportTT}><i className="fas fa-file-excel"/>Export</button>
              <button className="btn btn-sm btn-ghost" onClick={()=>window.print()}><i className="fas fa-print"/>Print</button>
            </div>
          </div>

          {/* Today highlight */}
          <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'8px',padding:'8px 12px',marginBottom:'12px',fontSize:'12px',color:'#1d4ed8',fontWeight:'700'}}>
            📌 Today: {today} — {PERIODS.map(p=>{const c=getCell(today,p);return c.subject?c.subject:null;}).filter(Boolean).join(' → ')||'No classes set'}
          </div>

          {/* Grid */}
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',minWidth:'600px'}}>
              <thead>
                <tr>
                  <th style={{padding:'8px 10px',background:'#0f172a',color:'#fff',borderRadius:'8px 0 0 0',textAlign:'left',width:'100px',fontSize:'11px'}}>Period</th>
                  {DAYS.map(d=>(
                    <th key={d} style={{padding:'8px 6px',background:d===today?'#0f766e':'#0f172a',color:'#fff',textAlign:'center',fontSize:'11px',fontWeight:d===today?'900':'700'}}>
                      {d.slice(0,3)}{d===today&&<span style={{display:'block',fontSize:'9px',color:'#5eead4'}}>Today</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>

                  const isBreak=p===4;

                      <td colSpan={7} style={{padding:'5px 10px',background:'#fef9c3',border:'1px solid #fde68a',textAlign:'center',fontSize:'11px',fontWeight:'700',color:'#92400e'}}>
                        ☕ Break — 10:15 to 10:30
                      </td>
                    </tr>
                  );
                  return(
                    <tr key={p} style={{borderBottom:'1px solid #f1f5f9'}}>
                      <td style={{padding:'6px 10px',background:'#f8fafc',fontWeight:'700',fontSize:'11px',verticalAlign:'top'}}>
                        <div>P{p}</div>

                      </td>
                      {DAYS.map(d=>{
                        const cell=getCell(d,p);
                        const isEd=editing&&editing.day===d&&editing.period===p;
                        const bg=cell.subject?getColor(cell.subject)+'22':'transparent';
                        const bc=cell.subject?getColor(cell.subject)+'66':'#e2e8f0';
                        return(
                          <td key={d} style={{padding:'4px',border:'1px solid #f1f5f9',verticalAlign:'top',background:d===today?'#f0fdf4':'transparent'}}>
                            {isEd?(
                              <div style={{display:'grid',gap:'3px',minWidth:'110px'}}>
                                <select style={{fontSize:'10px',padding:'3px',border:'1px solid #e2e8f0',borderRadius:'5px',outline:'none'}} value={editVal.subject} onChange={e=>setEditVal(v=>({...v,subject:e.target.value}))}>
                                  <option value="">-- Subject --</option>
                                  {subjects.map(s=><option key={s} value={s}>{s}</option>)}
                                  <option value="P.T.">P.T.</option>
                                  <option value="Drawing">Drawing</option>
                                  <option value="G.K.">G.K.</option>
                                  <option value="Break">Break</option>
                                </select>
                                <select style={{fontSize:'10px',padding:'3px',border:'1px solid #e2e8f0',borderRadius:'5px',outline:'none'}} value={editVal.teacher} onChange={e=>setEditVal(v=>({...v,teacher:e.target.value}))}>
                                  <option value="">-- Teacher --</option>
                                  {users.filter(u=>u.role!=='md_primary'&&u.role!=='md_middle'&&u.role!=='md_senior').map(u=><option key={u.id} value={u.name}>{u.name}</option>)}
                                </select>
                                <input style={{fontSize:'10px',padding:'3px',border:'1px solid #e2e8f0',borderRadius:'5px',outline:'none'}} placeholder="Room No." value={editVal.room} onChange={e=>setEditVal(v=>({...v,room:e.target.value}))}/>
                                <div style={{display:'flex',gap:'3px'}}>
                                  <button onClick={()=>{setCell(d,p,editVal);setEditing(null);}} style={{flex:1,fontSize:'10px',padding:'3px',background:'#0f766e',color:'#fff',border:'none',borderRadius:'4px',cursor:'pointer'}}>✓</button>
                                  <button onClick={()=>{setCell(d,p,{subject:'',teacher:'',room:''});setEditing(null);}} style={{fontSize:'10px',padding:'3px 5px',background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:'4px',cursor:'pointer'}}>✕</button>
                                </div>
                              </div>
                            ):(
                              <div onClick={()=>{if(!canEdit)return;setEditing({day:d,period:p});setEditVal(cell);}} style={{minHeight:'48px',padding:'5px 6px',borderRadius:'6px',background:bg,border:`1px solid ${bc}`,cursor:canEdit?'pointer':'default',transition:'all .15s'}}
                                onMouseEnter={e=>{if(canEdit)e.currentTarget.style.opacity='.8';}}
                                onMouseLeave={e=>{e.currentTarget.style.opacity='1';}}>
                                {cell.subject?(
                                  <>
                                    <div style={{fontWeight:'800',fontSize:'11px',color:getColor(cell.subject)}}>{cell.subject}</div>
                                    {cell.teacher&&<div style={{fontSize:'9px',color:'#64748b',marginTop:'1px'}}>{cell.teacher.split(' ')[0]}</div>}
                                    {cell.room&&<div style={{fontSize:'9px',color:'#94a3b8'}}>Rm:{cell.room}</div>}
                                  </>

                                  canEdit&&<div style={{fontSize:'10px',color:'#cbd5e1',textAlign:'center',paddingTop:'8px'}}>+ Add</div>

                      })}

              </tbody>

          </div>
          {canEdit&&<div style={{fontSize:'11px',color:'#94a3b8',marginTop:'10px',textAlign:'center'}}>💡 Kisi bhi cell pe click karo to edit karo</div>}

      {/* Teacher-wise View */}
      {view==='teacher'&&(
        <div className="card">
          <div style={{marginBottom:'14px'}}>
            <label className="label">Teacher Select Karo</label>

              <option value="">-- Teacher --</option>
              {users.filter(u=>!['md_primary','md_middle','md_senior'].includes(u.role)).map(u=><option key={u.id} value={u.name}>{u.name} ({ROLES[getPrimaryRole(u)]?.label||u.role})</option>)}
            </select>
          </div>
          {selTeacher&&(()=>{
            const ttRows=getTeacherTT();
            if(!ttRows.length)return<div className="nodata"><i className="fas fa-calendar-times"/><p>Is teacher ki koi class assign nahi hui</p></div>;
            const byDay=DAYS.reduce((a,d)=>{a[d]=ttRows.filter(r=>r.day===d);return a;},{});
            return(
              <div style={{display:'grid',gap:'10px'}}>
                <div style={{fontWeight:'700',color:'#1d4ed8',fontSize:'13px'}}>📋 {selTeacher} — Weekly Schedule ({ttRows.length} periods)</div>
                {DAYS.map(d=>{
                  const rows=byDay[d]||[];
                  if(!rows.length)return null;
                  return(
                    <div key={d} style={{border:`1.5px solid ${d===today?'#0f766e':'#e2e8f0'}`,borderRadius:'10px',overflow:'hidden'}}>
                      <div style={{background:d===today?'#0f766e':'#f8fafc',padding:'8px 12px',fontWeight:'700',fontSize:'12px',color:d===today?'#fff':'#374151'}}>
                        {d}{d===today&&' — Today'}
                      </div>
                      <div style={{display:'flex',gap:'6px',padding:'8px',flexWrap:'wrap'}}>
                        {rows.map((r,i)=>(
                          <div key={i} style={{background:getColor(r.subject)+'18',border:`1px solid ${getColor(r.subject)}44`,borderRadius:'8px',padding:'6px 10px',fontSize:'11px'}}>
                            <div style={{fontWeight:'800',color:getColor(r.subject)}}>{r.subject}</div>
                            <div style={{color:'#64748b'}}>P{r.period} · {r.time}</div>
                            <div style={{color:'#374151',fontWeight:'700'}}>Cls {r.class}-{r.section}</div>
                            {r.room&&<div style={{color:'#94a3b8'}}>Rm:{r.room}</div>}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ── GLOBAL SEARCH ────────────────────────────────────────────────────
function GlobalSearch({user,onClose,onNav}){
  const[q,setQ]=useState('');
  const inputRef=React.useRef(null);
  useEffect(()=>{
    inputRef.current?.focus();
    const handler=(e)=>{if(e.key==='Escape')onClose();if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();onClose();}};
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);
  const results=useMemo(()=>{
    if(!q||q.trim().length<2)return[];
    const qL=q.trim().toLowerCase();
    const out=[];
    // Students
    const sts=DB.get('students',[]);
    sts.filter(s=>(s.name||'').toLowerCase().includes(qL)||(s.fatherName||'').toLowerCase().includes(qL)||(s.mobile||'').includes(q)||(s.srNo||'').toString().includes(q)).slice(0,6).forEach(s=>{
      out.push({type:'student',icon:'fa-user-graduate',color:'#0f766e',title:s.name,sub:`Class ${s.class}-${s.section} · Father: ${s.fatherName||'—'} · ${s.mobile||'No mobile'}`,page:'students',data:s});
    });
    // Teachers/Staff
    const users=DB.get('users',[]);
    users.filter(u=>(u.name||'').toLowerCase().includes(qL)||(u.username||'').toLowerCase().includes(qL)||(u.mobile||'').includes(q)).slice(0,4).forEach(u=>{
      out.push({type:'staff',icon:'fa-chalkboard-teacher',color:'#1d4ed8',title:u.name,sub:`${ROLES[getPrimaryRole(u)]?.label||u.role} · ${u.username}`,page:'teachers',data:u});
    });
    // Pages
    const pageMap=[
      {id:'dashboard',label:'Dashboard',icon:'fa-gauge',color:'#7c3aed'},
      {id:'students',label:'Students',icon:'fa-users',color:'#0f766e'},
      {id:'attendance',label:'Attendance',icon:'fa-calendar-check',color:'#dc2626'},
      {id:'homework',label:'Homework',icon:'fa-book-open',color:'#d97706'},
      {id:'tests',label:'Tests & Marks',icon:'fa-file-alt',color:'#0891b2'},
      {id:'calling',label:'Calling Log',icon:'fa-phone',color:'#16a34a'},
      {id:'weak',label:'Weak Students',icon:'fa-chart-line',color:'#ea580c'},
      {id:'reportcard',label:'Report Card',icon:'fa-award',color:'#7c3aed'},
      {id:'whatsapp',label:'WhatsApp',icon:'fa-whatsapp fa-brands',color:'#16a34a'},
      {id:'devmode',label:'Developer Console',icon:'fa-terminal',color:'#334155'},
    ];
    pageMap.filter(p=>p.label.toLowerCase().includes(qL)&&canAccess(user,p.id)).slice(0,3).forEach(p=>{
      out.push({type:'page',icon:p.icon,color:p.color,title:p.label,sub:'Go to page →',page:p.id,data:null});
    });
    return out;
  },[q]);

  const groups={student:'👨‍🎓 Students',staff:'👤 Staff',page:'📄 Pages'};
  const grouped=results.reduce((acc,r)=>{(acc[r.type]=acc[r.type]||[]).push(r);return acc;},{});

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.7)',zIndex:9999,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'80px'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#fff',borderRadius:'16px',width:'100%',maxWidth:'560px',boxShadow:'0 24px 80px rgba(0,0,0,.4)',overflow:'hidden',maxHeight:'80vh',display:'flex',flexDirection:'column',margin:'0 16px'}}>
        {/* Search Input */}
        <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'16px 18px',borderBottom:'1px solid #e2e8f0'}}>
          <i className="fas fa-search" style={{color:'#94a3b8',fontSize:'16px',flexShrink:0}}/>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Student, teacher, page search karo..." style={{border:'none',outline:'none',fontSize:'15px',flex:1,fontFamily:'inherit',color:'#1e293b'}} autoComplete="off"/>
          {q&&<button onClick={()=>setQ('')} style={{background:'#f1f5f9',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer',color:'#64748b',fontSize:'12px'}}>✕</button>}
          <kbd onClick={onClose} style={{background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'3px 8px',fontSize:'11px',cursor:'pointer',color:'#64748b'}}>ESC</kbd>
        </div>
        {/* Results */}
        <div style={{overflowY:'auto',flex:1}}>
          {q.length<2?(
            <div style={{padding:'32px 18px',textAlign:'center',color:'#94a3b8'}}>
              <i className="fas fa-search" style={{fontSize:'28px',marginBottom:'10px',display:'block'}}/>
              <div style={{fontSize:'13px'}}>Student ka naam, father ka naam, mobile number ya page type karo</div>
            </div>
          ):results.length===0?(
            <div style={{padding:'32px 18px',textAlign:'center',color:'#94a3b8'}}>
              <i className="fas fa-frown" style={{fontSize:'28px',marginBottom:'10px',display:'block'}}/>
              <div style={{fontSize:'13px'}}>"{q}" ke liye koi result nahi mila</div>
            </div>
          ):(
            Object.entries(grouped).map(([type,items])=>(
              <div key={type}>
                <div style={{padding:'8px 18px 4px',fontSize:'10px',fontWeight:'800',color:'#94a3b8',letterSpacing:'1px',textTransform:'uppercase',background:'#f8fafc'}}>{groups[type]}</div>
                {items.map((r,i)=>(
                  <div key={i} onClick={()=>{onNav(r.page);}} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 18px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',transition:'background .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'}
                    onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                    <div style={{width:'36px',height:'36px',borderRadius:'10px',background:r.color+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <i className={`fas ${r.icon}`} style={{color:r.color,fontSize:'14px'}}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:'700',fontSize:'13px',color:'#1e293b'}}>{r.title}</div>
                      <div style={{fontSize:'11px',color:'#64748b',marginTop:'1px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.sub}</div>
                    </div>
                    {r.type==='student'&&r.data?.mobile&&(
                      <a href={`tel:${r.data.mobile}`} onClick={e=>e.stopPropagation()} style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'8px',padding:'4px 8px',fontSize:'11px',color:'#15803d',textDecoration:'none',fontWeight:'700',flexShrink:0}}><i className="fas fa-phone" style={{marginRight:'4px'}}/>Call</a>
                    )}
                    <i className="fas fa-arrow-right" style={{color:'#cbd5e1',fontSize:'11px',flexShrink:0}}/>
                  </div>
                ))}
              </div>
            ))
          )}
        </div>
        <div style={{padding:'8px 18px',background:'#f8fafc',borderTop:'1px solid #e2e8f0',fontSize:'10px',color:'#94a3b8',display:'flex',gap:'12px'}}>
          <span>↑↓ navigate</span><span>↵ open</span><span>ESC close</span>
        </div>
      </div>
    </div>
  );
}

function App(){
  // Session check — localStorage se restore (app close pe logout nahi)
  const[user,setUser]=useState(()=>{
    try{const s=localStorage.getItem('rsga_session');return s?JSON.parse(s):null;}catch{return null;}
  });
  const[page,setPage]=useState('dashboard');
  const[open,setOpen]=useState(false);
  const[gSearch,setGSearch]=useState(false); // global search overlay

  // Seed only once on mount, not on every render
  useEffect(()=>{
    seed();
    applyStaffUpdates();
    // Restore dark mode preference
    if(localStorage.getItem('rsga3_darkmode')==='1') document.body.classList.add('dark-mode');
  },[]);
  // Global keyboard shortcut Ctrl+K / Cmd+K → open search
  useEffect(()=>{
    const h=(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setGSearch(v=>!v);}};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  const handleLogin=(u)=>{
    // Migrate legacy single role → roles array on login
    if(!Array.isArray(u.roles)||u.roles.length===0){u.roles=[u.role||'subjectteacher'];}
    setUser(u);
    const firstPage=canAccess(u,'dashboard')?'dashboard':(ALL_PAGES.find(p=>canAccess(u,p))||'dashboard');
    setPage(firstPage);
    // ── Pull latest requests from Firebase on login (so admin/dev see fresh data) ──
    if(window.db){
      const reqKeys=['teacher_requests','role_requests','transfer_requests'];
      reqKeys.forEach(async(key)=>{
        try{
          const snap=await window.db.collection('rsga_erp').doc(key).get();
          if(snap.exists){const val=snap.data().value;if(val!==undefined){DB.set(key,val);}}
        }catch(e){}
      });
    }
    // Request browser notification permission
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission().then(perm=>{
        if(perm==='granted'){
          const td=new Date().toISOString().split('T')[0];
          const absentCount=DB.get('students',[]).filter(s=>{
            const att=DB.get(`att_${s.class}_${s.section}_${td}`,{});
            return att[s.id]==='A';
          }).length;
          setTimeout(()=>{
            new Notification('🏫 RSGA ERP — Good Morning '+u.name.split(' ')[0]+'!',{
              body:absentCount>0?`Today ${absentCount} students absent hain. Calling Log check karo.`:'Aaj ka attendance mark karna na bhulen!',
              icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230f766e"/><text y=".9em" font-size="90" x="5">🏫</text></svg>'
            });
          },1500);
        }
      });
    } else if('Notification' in window && Notification.permission==='granted'){
      const td=new Date().toISOString().split('T')[0];
      const absentCount=DB.get('students',[]).filter(s=>{
        const att=DB.get(`att_${s.class}_${s.section}_${td}`,{});
        return att[s.id]==='A';
      }).length;
      if(absentCount>0){
        setTimeout(()=>{
          new Notification('📞 RSGA — Absent Alert',{
            body:`${absentCount} students aaj absent hain. Calling Log → Absent tab check karo.`,
          });
        },2000);
      }
    }
  };
  const handleLogout=()=>{
    localStorage.removeItem('rsga_session');
    setUser(null);
    setPage('dashboard');
  };

  if(!user)return <Login onLogin={handleLogin}/>;

  // Newly approved teacher must set credentials before accessing the app
  // Only trigger for accounts explicitly created from an approval (status === 'pending_setup')
  if(user.status==='pending_setup'){
    return <FirstLoginSetup user={user} onComplete={(updatedUser)=>{
      if(!Array.isArray(updatedUser.roles)||updatedUser.roles.length===0){updatedUser.roles=[updatedUser.role||'subjectteacher'];}
      setUser(updatedUser);
      const firstPage=canAccess(updatedUser,'dashboard')?'dashboard':(ALL_PAGES.find(p=>canAccess(updatedUser,p))||'dashboard');
      setPage(firstPage);
    }}/>;
  }

  const navTo=(p)=>{if(canAccess(user,p))setPage(p);};
  const pages={
    dashboard:<Dashboard user={user}/>,
    students:<Students user={user}/>,
    attendance:<Attendance user={user}/>,
    homework:<Homework user={user}/>,
    tests:<Tests user={user}/>,
    mdtest:<MDTest user={user}/>,
    notebook:<Notebook user={user}/>,
    calling:<Calling user={user}/>,
    weak:<WeakStudents user={user}/>,
    reportcard:<ReportCard user={user}/>,

  };

  return(

      {gSearch&&<GlobalSearch user={user} onClose={()=>setGSearch(false)} onNav={(p)=>{navTo(p);setGSearch(false);}}/>}

          {pages[curPage]||<div className="card"><div className="nodata"><i className="fas fa-tools"/><p>Coming soon...</p></div></div>}
        </div>
      </div>
      <MobileNav user={user} page={curPage} setPage={navTo}/>
    </div>
  );
}

<!-- Service Worker Registration (PWA Offline Support) -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    // Inline SW as blob since we're a single HTML file
    const swCode = `
const CACHE='rsga-erp-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.mode==='navigate'){
    e.respondWith(caches.match('/').then(r=>r||fetch(e.request)).catch(()=>caches.match('/')));
  }
});
    `;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(()=>{
      console.log('✅ Service Worker registered — Offline support active');
    }).catch(e=>console.warn('SW registration failed:',e));
  });
}
</script>

<!-- ═══════════════════════════════════════════════════════════════════
     FIREBASE SYNC — UMD version (GitHub Pages compatible)
     ═══════════════════════════════════════════════════════════════════ -->
<script>
  // ── Firebase config ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyD_i6cdAREp8sHoWvVcM_0anX8vVV36uco",
    authDomain:        "rsga-fa89f.firebaseapp.com",
    projectId:         "rsga-fa89f",
    storageBucket:     "rsga-fa89f.firebasestorage.app",
    messagingSenderId: "552424921107",
    appId:             "1:552424921107:web:5bdb99629f5917236207e6"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  window.db = db; // Make globally accessible for login & teacher sync

  // ── UI status badge ──────────────────────────────────────────────
  function setStatus(msg, color) {
    const el = document.getElementById('fb-status');
    if (el) { el.textContent = msg; el.style.background = color; el.style.display = 'block'; }
  }

  // ── UPLOAD: push all localStorage (rsga3_*) keys to Firestore ───
  // Firestore writeBatch limit = 500 ops, so we chunk into 490 per batch
  window.firebaseUploadAll = async () => {
    try {
      setStatus('⬆️ Syncing to Firebase...', '#2563eb');
      const entries = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith('rsga3_')) continue;
        const key = k.replace('rsga3_', '').replace(/\//g, '_');
        let val;
        try { val = JSON.parse(localStorage.getItem(k)); } catch { val = localStorage.getItem(k); }
        entries.push({ key, val });
      }
      const CHUNK = 490;
      for (let ci = 0; ci < entries.length; ci += CHUNK) {
        const chunk = entries.slice(ci, ci + CHUNK);
        const batch = db.batch();
        chunk.forEach(({ key, val }) => {
          batch.set(db.collection('rsga_erp').doc(key), { value: val, updatedAt: Date.now() });
        });
        await batch.commit();
        setStatus('⬆️ Uploading… ' + Math.min(ci + CHUNK, entries.length) + '/' + entries.length, '#2563eb');
      }
      setStatus('✅ Upload complete! (' + entries.length + ' records)', '#16a34a');
      setTimeout(() => { const el = document.getElementById('fb-status'); if(el) el.style.display='none'; }, 4000);
    } catch (e) {
      setStatus('❌ Upload failed: ' + e.message, '#dc2626');
      console.error('Firebase upload error:', e);
    }
  };

  // ── DOWNLOAD: pull all Firestore docs → localStorage ────────────
  window.firebaseDownloadAll = async () => {
    try {
      setStatus('⬇️ Downloading from Firebase…', '#7c3aed');
      const snap = await db.collection('rsga_erp').get();
      snap.forEach(docSnap => {
        const key = 'rsga3_' + docSnap.id;
        const data = docSnap.data();
        try { localStorage.setItem(key, JSON.stringify(data.value)); } catch(e) { console.warn('Could not save key', key, e); }
      });
      setStatus('✅ Restore complete! Reloading...', '#16a34a');
      setTimeout(() => window.location.reload(), 1500);
    } catch (e) {
      setStatus('❌ Restore failed: ' + e.message, '#dc2626');
      console.error('Firebase download error:', e);
    }
  };

  // ── LIVE SYNC INDICATOR ─────────────────────────────────────────
  let syncCount = 0;
  let syncOK = false;

  function updateLiveIndicator(state) {
    const dot = document.getElementById('live-dot');
    const txt = document.getElementById('live-txt');
    const ts  = document.getElementById('live-ts');
    if (!dot || !txt) return;
    if (state === 'syncing') {
      dot.style.background = '#f59e0b'; dot.style.animation = 'livePulse 0.6s ease infinite';
      txt.textContent = 'Syncing...';
    } else if (state === 'ok') {
      dot.style.background = '#22c55e'; dot.style.animation = 'livePulse 2s ease infinite';
      txt.textContent = 'Live Synced';
      if (ts) { const d = new Date(); ts.textContent = d.toLocaleTimeString('en-IN'); }
      syncOK = true;
    } else if (state === 'error') {
      dot.style.background = '#ef4444'; dot.style.animation = 'none';
      txt.textContent = 'Sync Failed';
    } else if (state === 'pending') {
      dot.style.background = '#94a3b8'; dot.style.animation = 'none';
      txt.textContent = 'Waiting...';
    }
  }

  // ── AUTO-SYNC: upload whenever localStorage changes (throttled) ──
  let syncTimer = null;
  const origSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(k, v) {
    origSetItem(k, v);
    if (k && k.startsWith('rsga3_')) {
      updateLiveIndicator('pending');
      clearTimeout(syncTimer);
      syncTimer = setTimeout(async () => {
        updateLiveIndicator('syncing');
        const key = k.replace('rsga3_', '').replace(/\//g, '_');
        let val; try { val = JSON.parse(v); } catch { val = v; }
        try {
          await db.collection('rsga_erp').doc(key).set({ value: val, updatedAt: Date.now() }, { merge: true });
          syncCount++;
          updateLiveIndicator('ok');
          const cnt = document.getElementById('live-count');
          if (cnt) cnt.textContent = syncCount + ' saves';
        } catch(e) {
          updateLiveIndicator('error');
          console.warn('Auto-sync error:', e);
        }
      }, 500); // debounce 0.5s
    }
  };

  console.log('🔥 Firebase Firestore connected — rsga-fa89f');
  updateLiveIndicator('pending');

  // ── AUTO-RESTORE + AUTO-SYNC USERS ─────────────────────────────────
  const hasLocalData = Array.from({length:localStorage.length},(_,i)=>localStorage.key(i)).some(k=>k&&k.startsWith('rsga3_students'));
  
  (async () => {
    try {
      const snap = await db.collection('rsga_erp').get();
      if (snap.size === 0) { updateLiveIndicator('pending'); return; }
      
      if (!hasLocalData) {
        // New device — load all data
        console.log('No local data — full restore from Firebase...');
        updateLiveIndicator('syncing');
        snap.forEach(docSnap => {
          const key = 'rsga3_' + docSnap.id;
          const data = docSnap.data();
          try { localStorage.setItem(key, JSON.stringify(data.value)); } catch(e) {}
        });
        updateLiveIndicator('ok');
        setStatus('✅ Data loaded! Refreshing...', '#16a34a');
        setTimeout(() => window.location.reload(), 1200);
      } else {
        // Existing device — update only USERS and TEACHERS from Firebase
        // So that new teachers are active immediately
        const usersDoc = snap.docs.find(d => d.id === 'users');
        if (usersDoc) {
          const firebaseUsers = usersDoc.data().value;
          if (Array.isArray(firebaseUsers) && firebaseUsers.length > 0) {
            // Merge with local users — Firebase always takes priority
            const localUsersRaw = localStorage.getItem('rsga3_users');
            const localUsers = localUsersRaw ? JSON.parse(localUsersRaw) : [];
            // Give priority to Firebase users — new teachers will be added
            const merged = [...firebaseUsers];
            // Keep entries that exist locally but not in Firebase (edge case)
            localUsers.forEach(lu => {
              if (!merged.find(u => u.id === lu.id)) merged.push(lu);
            });
            localStorage.setItem('rsga3_users', JSON.stringify(merged));
            console.log('✅ Users synced from Firebase:', merged.length);
          }
        }
        updateLiveIndicator('ok');
      }
    } catch(e) {
      updateLiveIndicator('error');
      console.warn('Auto-restore failed:', e);
    }
  })();
</script>
