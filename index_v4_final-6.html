// ── DEVELOPER CONSOLE (Maximum Power) ───────────────────────────────
function DevMode({user}){
  if(!isMDSir(user))return<div className="card"><div className="alert alert-e"><i className="fas fa-lock"/>Developer Console is restricted to Developer &amp; MD Sir only.</div></div>;

  const[tab,setTab]=useState('staff');
  const[msg,setMsg]=useState('');
  const toast=(m,ok=true)=>{setMsg({t:m,ok});setTimeout(()=>setMsg(''),3500);};

  // ── Firebase push helper ─────────────────────────────────────────
  const fbPush=async(docId,val)=>{
    if(window.db){
      try{
        await window.db.collection('rsga_erp').doc(docId).set({value:val,updatedAt:Date.now()},{merge:true});
        return true;
      }catch(e){return false;}
    }
    return false;
  };

  const saveAndSync=async(key,val)=>{
    DB.set(key,val);
    const ok=await fbPush(key,val);
    toast(ok?`✅ Saved & synced to Firebase: ${key}`:`✅ Saved locally (Firebase offline): ${key}`,ok);
  };

  // ─────────────────────────────────────────────────────────────────
  // TAB 1: STAFF MANAGER
  // ─────────────────────────────────────────────────────────────────
  const StaffTab=()=>{
    const[users,setUsers]=useState(DB.get('users',[]));
    const[edit,setEdit]=useState(null);
    const[form,setForm]=useState({id:'',name:'',username:'',pwd:'',role:'classteacher',class:'',section:'',subject:''});
    const[showPwd,setShowPwd]=useState(false);
    const cls=DB.get('classes',[]);
    const sec=DB.get('sections',{});
    const rf=(k,v)=>setForm(p=>({...p,[k]:v}));
    const startEdit=(u)=>{setEdit(u.id);setForm({...u,pwd:''});};
    const startAdd=()=>{setEdit('__new__');setForm({id:'',name:'',username:'',pwd:'',role:'classteacher',class:'',section:'',subject:''});};
    const cancel=()=>{setEdit(null);};

    const saveUser=async()=>{
      if(!form.name.trim()||!form.username.trim()){toast('❌ Name & username required',false);return;}
      let list=DB.get('users',[]);
      const dup=list.find(u=>u.id!==(edit==='__new__'?null:edit)&&u.username?.toLowerCase()===form.username.trim().toLowerCase());
      if(dup){toast(`❌ Username taken by ${dup.name}`,false);return;}
      let entry={...form,name:form.name.trim(),username:form.username.trim()};
      if(form.pwd.trim()){const h=await hashPassword(form.pwd.trim());entry={...entry,password:h,passwordHash:h};}
      if(edit==='__new__'){entry.id='u'+Date.now();list=[...list,entry];}
      else{list=list.map(u=>u.id===edit?{...u,...entry}:u);}
      setUsers(list);
      await saveAndSync('users',list);
      // Also update assignment if class/section set
      if(entry.role==='classteacher'&&entry.class&&entry.section){
        const ak='assign_'+entry.id;
        const av=[{id:'a_dev_'+entry.id,class:entry.class,section:entry.section,subject:'All',role:'classTeacher'}];
        DB.set(ak,av);await fbPush(ak,av);
      }
      setEdit(null);
    };

    const delUser=async(uid)=>{
      if(!confirm('Delete this staff member? This cannot be undone!'))return;
      const list=DB.get('users',[]).filter(u=>u.id!==uid);
      setUsers(list);
      await saveAndSync('users',list);
    };

    const sorted=[...users].sort((a,b)=>a.name.localeCompare(b.name));
    const ri=(r)=>ROLES[r]||{label:r,color:'#475569',bg:'#f1f5f9',icon:'👤'};

    return(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <span className="badge badge-b">{users.length} Staff</span>
        <button className="btn btn-success btn-sm" onClick={startAdd}><i className="fas fa-plus"/>Add New Staff</button>
      </div>

      {edit&&<div className="card" style={{marginBottom:'14px',border:'2px solid #bfdbfe',background:'#f0f9ff'}}>
        <div className="section-hdr" style={{marginBottom:'12px'}}><i className="fas fa-user-edit"/>{edit==='__new__'?'New Staff':'Edit: '+form.name}</div>
        <div className="g2" style={{gap:'10px'}}>
          <div><label className="label">Full Name *</label><input className="input" value={form.name} onChange={e=>rf('name',e.target.value)} placeholder="Full name"/></div>
          <div><label className="label">Username *</label><input className="input" value={form.username} onChange={e=>rf('username',e.target.value.toLowerCase())} placeholder="username"/></div>
          <div style={{position:'relative'}}>
            <label className="label">{edit==='__new__'?'Password *':'New Password (leave blank = no change)'}</label>
            <input className="input" type={showPwd?'text':'password'} value={form.pwd} onChange={e=>rf('pwd',e.target.value)} placeholder={edit==='__new__'?'Min 4 chars':'Leave blank to keep old'} style={{paddingRight:'38px'}}/>
            <button onClick={()=>setShowPwd(v=>!v)} style={{position:'absolute',right:'10px',bottom:'9px',background:'none',border:'none',cursor:'pointer',color:'#94a3b8'}}><i className={`fas ${showPwd?'fa-eye-slash':'fa-eye'}`}/></button>
          </div>
          <div><label className="label">Role</label>
            <select className="select" value={form.role} onChange={e=>rf('role',e.target.value)}>
              {Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          {(form.role==='classteacher'||form.role==='subjectteacher'||form.role==='incharge')&&<>
            <div><label className="label">Class</label>
              <select className="select" value={form.class} onChange={e=>rf('class',e.target.value)}>
                <option value="">— None —</option>
                {cls.map(c=><option key={c} value={c}>Class {c}</option>)}
              </select>
            </div>
            <div><label className="label">Section</label>
              <select className="select" value={form.section} onChange={e=>rf('section',e.target.value)}>
                <option value="">— None —</option>
                {(sec[form.class]||[]).map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </>}
          <div><label className="label">Subject</label><input className="input" value={form.subject} onChange={e=>rf('subject',e.target.value)} placeholder="e.g. English"/></div>
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
          <button className="btn btn-success btn-sm" onClick={saveUser}><i className="fas fa-cloud-upload-alt"/>Save & Sync Firebase</button>
          <button className="btn btn-ghost btn-sm" onClick={cancel}>Cancel</button>
        </div>
      </div>}

      <div style={{display:'grid',gap:'8px'}}>
        {sorted.map(u=>{const r=ri(getPrimaryRole(u));
          // WA credentials message
          const waCredMsg=`🏫 *R.S. Global Academy, Jirauli, Mainpuri*\n\n🔐 *ERP Login Credentials*\n\nNaam: *${u.name}*\nUsername: *${u.username}*\nPassword: *(as set by admin)*\n\n🔗 Login Link:\nhttps://machanicalsingh-a11y.github.io/rsga-erp/\n\nPlease change your password after logging in.\n\nRegards,\n*R.S. Global Academy*`;
          const canSendCreds=isAdmin(user)||isDeveloper(user);
          return(
          <div key={u.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'11px 14px',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',flexWrap:'wrap'}}>
            <div style={{width:'38px',height:'38px',borderRadius:'50%',background:r.color||'#475569',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',flexShrink:0}}>{r.icon}</div>
            <div style={{flex:1,minWidth:'120px'}}>
              <div style={{fontWeight:'800',fontSize:'13px'}}>{u.name}</div>
              <div style={{fontSize:'11px',color:'#64748b'}}>@{u.username} • {r.label}</div>
              {u.class&&<div style={{fontSize:'11px',color:'var(--blue)'}}>📚 {u.class}-{u.section}</div>}
            </div>
            <span className="badge" style={{background:r.bg,color:r.color,fontSize:'10px'}}>{r.label}</span>
            <div style={{display:'flex',gap:'5px'}}>
              {canSendCreds&&u.mobile&&(
                <a href={waLink(u.mobile,waCredMsg)} className="btn btn-xs btn-wa" style={{textDecoration:'none'}} title="Send Login Credentials via WhatsApp"
                  onClick={e=>openWA(waLink(u.mobile,waCredMsg),e)}>
                  <i className="fab fa-whatsapp"/>Creds
                </a>
              )}
              <button className="btn btn-xs btn-outline" onClick={()=>startEdit(u)}><i className="fas fa-edit"/></button>
              {u.id!==user.id&&<button className="btn btn-xs btn-danger" onClick={()=>delUser(u.id)}><i className="fas fa-trash"/></button>}
            </div>
          </div>
        );})}
      </div>
    </div>);
  };

  // ─────────────────────────────────────────────────────────────────
  // TAB 2: CLASSES, SECTIONS & SUBJECTS
  // ─────────────────────────────────────────────────────────────────
  const StructureTab=()=>{
    const[cls,setCls]=useState(DB.get('classes',[]));
    const[sec,setSec]=useState(DB.get('sections',{}));
    const[subs,setSubs]=useState(DB.get('subjects',[]));
    const[newSub,setNewSub]=useState('');
    const[newSec,setNewSec]=useState('');
    const[selCls,setSelCls]=useState(cls[0]||'');

    const saveCls=async(arr)=>{setCls(arr);await saveAndSync('classes',arr);};
    const saveSec=async(obj)=>{setSec(obj);await saveAndSync('sections',obj);};
    const saveSubs=async(arr)=>{setSubs(arr);await saveAndSync('subjects',arr);};

    const addSec=async()=>{if(!newSec.trim()||!selCls)return;const cur=sec[selCls]||[];if(cur.includes(newSec.trim())){toast('Already exists',false);return;}const ns={...sec,[selCls]:[...cur,newSec.trim()]};await saveSec(ns);setNewSec('');};
    const delSec=async(c,s)=>{if(!confirm(`Delete ${c}-${s}?`))return;const ns={...sec,[c]:(sec[c]||[]).filter(x=>x!==s)};await saveSec(ns);};
    const addSub=async()=>{if(!newSub.trim())return;if(subs.includes(newSub.trim())){toast('Already exists',false);return;}await saveSubs([...subs,newSub.trim()]);setNewSub('');};
    const delSub=async(s)=>{if(!confirm(`Remove subject "${s}"?`))return;await saveSubs(subs.filter(x=>x!==s));};

    return(<div className="g2">
      <div>
        <div className="card" style={{marginBottom:'14px'}}>
          <div className="section-hdr"><i className="fas fa-layer-group" style={{color:'var(--blue)'}}/>Classes ({cls.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'12px'}}>
            {cls.map(c=><span key={c} style={{display:'inline-flex',alignItems:'center',gap:'4px',background:'#eff6ff',color:'var(--navy)',fontWeight:'800',padding:'5px 10px',borderRadius:'8px',fontSize:'13px'}}>
              Class {c}
              <button onClick={()=>{if(!confirm(`Remove Class ${c}?`))return;saveCls(cls.filter(x=>x!==c));}} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'11px',padding:'0 2px'}}>✕</button>
            </span>)}
          </div>
          <div className="alert alert-i" style={{fontSize:'12px'}}><i className="fas fa-info-circle"/>Classes are fixed (1-12). Contact developer to modify.</div>
        </div>

        <div className="card">
          <div className="section-hdr"><i className="fas fa-sitemap" style={{color:'#8b5cf6'}}/>Sections</div>
          <div style={{marginBottom:'10px'}}>
            <label className="label">Select Class</label>
            <select className="select" value={selCls} onChange={e=>setSelCls(e.target.value)}>
              {cls.map(c=><option key={c} value={c}>Class {c}</option>)}
            </select>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'10px'}}>
            {(sec[selCls]||[]).map(s=><span key={s} style={{display:'inline-flex',alignItems:'center',gap:'4px',background:'#f5f3ff',color:'#6d28d9',fontWeight:'700',padding:'4px 10px',borderRadius:'7px',fontSize:'12px'}}>
              {s}<button onClick={()=>delSec(selCls,s)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'10px'}}>✕</button>
            </span>)}
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <input className="input" value={newSec} onChange={e=>setNewSec(e.target.value.toUpperCase())} placeholder="e.g. A4" style={{flex:1}}/>
            <button className="btn btn-success btn-sm" onClick={addSec}><i className="fas fa-plus"/>Add</button>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="section-hdr"><i className="fas fa-book" style={{color:'#16a34a'}}/>Subjects ({subs.length})</div>
        <div style={{display:'grid',gap:'6px',marginBottom:'12px'}}>
          {subs.map((s,i)=><div key={s} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px'}}>
            <span style={{fontWeight:'600',fontSize:'13px',flex:1}}>{i+1}. {s}</span>
            <button className="btn btn-xs btn-danger" onClick={()=>delSub(s)}><i className="fas fa-trash"/></button>
          </div>)}
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <input className="input" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="New subject name"/>
          <button className="btn btn-success btn-sm" onClick={addSub}><i className="fas fa-plus"/>Add</button>
        </div>
      </div>
    </div>);
  };

  // ─────────────────────────────────────────────────────────────────
  // TAB 3: PERMISSIONS EDITOR
  // ─────────────────────────────────────────────────────────────────
  const PermsTab=()=>{
    const allPages=MENU_ITEMS.map(m=>({id:m.id,label:m.label,icon:m.icon}));
    const roleKeys=Object.keys(ROLES);
    const[perms,setPerms]=useState(()=>JSON.parse(JSON.stringify(ROLE_ACCESS)));
    const[sv,setSv]=useState(false);

    const toggle=(role,page)=>{
      setPerms(p=>{
        const cur=p[role]||[];
        const next=cur.includes(page)?cur.filter(x=>x!==page):[...cur,page];
        return{...p,[role]:next};
      });
      setSv(false);
    };

    const savePerms=async()=>{
      // Save to localStorage so it persists this session
      DB.set('role_access_override',perms);
      await fbPush('role_access_override',perms);
      // Apply live
      Object.assign(ROLE_ACCESS,perms);
      setSv(true);
      toast('✅ Permissions saved! Re-login required for all users.');

  // ─────────────────────────────────────────────────────────────────
  // TAB 4: RAW FIREBASE / DATA INSPECTOR
  // ─────────────────────────────────────────────────────────────────
  const DataTab=()=>{
    const[keys,setKeys]=useState(DB.keys().sort());
    const[selKey,setSelKey]=useState(null);
    const[keyData,setKeyData]=useState('');
    const[fbDocs,setFbDocs]=useState([]);
    const[loading,setLoading]=useState(false);
    const[src,setSrc]=useState('local'); // 'local' | 'firebase'

    const loadLocal=()=>{setKeys(DB.keys().sort());setSrc('local');setSelKey(null);};
    const loadFirebase=async()=>{
      if(!window.db){toast('Firebase not connected',false);return;}
      setLoading(true);
      try{
        const snap=await window.db.collection('rsga_erp').get();
        setFbDocs(snap.docs.map(d=>({id:d.id,data:d.data()})));
        setSrc('firebase');setSelKey(null);
      }catch(e){toast('❌ Firebase error: '+e.message,false);}
      setLoading(false);
    };
    const loadKey=(k,data)=>{setSelKey(k);setKeyData(JSON.stringify(data!==undefined?data:DB.get(k),null,2));};
    const saveKey=async()=>{
      try{
        const parsed=JSON.parse(keyData);
        await saveAndSync(selKey,parsed);
        loadLocal();
      }catch{toast('❌ Invalid JSON!',false);}
    };
    const delKey=async(k)=>{
      if(!confirm(`Delete "${k}"?`))return;
      DB.del(k);
      if(window.db){try{await window.db.collection('rsga_erp').doc(k).delete();}catch(e){}}
      toast(`🗑️ Deleted: ${k}`);loadLocal();setSelKey(null);
    };
    const sz=()=>{let s=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('rsga3_'))s+=localStorage.getItem(k)?.length||0;}return(s/1024).toFixed(1);};

    return(<div>
      <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
        <button className={`btn btn-sm ${src==='local'?'btn-primary':'btn-outline'}`} onClick={loadLocal}><i className="fas fa-hdd"/>Local ({keys.length} keys, {sz()} KB)</button>
        <button className={`btn btn-sm ${src==='firebase'?'btn-primary':'btn-outline'}`} onClick={loadFirebase}><i className="fas fa-fire"/>{loading?'Loading...':'Firebase Docs'} ({fbDocs.length})</button>
      </div>
      <div className="g2">
        <div className="card" style={{maxHeight:'420px',overflowY:'auto'}}>
          <div className="section-hdr" style={{marginBottom:'8px'}}><i className="fas fa-list"/>{src==='firebase'?'Firestore Documents':'LocalStorage Keys'}</div>
          {(src==='local'?keys:fbDocs.map(d=>d.id)).map(k=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:'6px',padding:'5px 0',borderBottom:'1px solid #f1f5f9'}}>
              <span style={{flex:1,fontFamily:'JetBrains Mono',fontSize:'11px',color:'var(--blue)',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                onClick={()=>{if(src==='firebase'){const d=fbDocs.find(x=>x.id===k);loadKey(k,d?.data?.value);}else loadKey(k);}}>{k}</span>
              <button className="btn btn-xs btn-danger" onClick={()=>delKey(k)}>✕</button>
            </div>
          ))}
        </div>
        {selKey&&<div className="card">
          <div className="section-hdr" style={{marginBottom:'8px'}}><i className="fas fa-code"/>Editing: <span style={{fontFamily:'JetBrains Mono',fontSize:'11px'}}>{selKey}</span></div>
          <textarea className="input" rows="14" value={keyData} onChange={e=>setKeyData(e.target.value)} style={{fontFamily:'JetBrains Mono',fontSize:'11px',resize:'vertical'}}/>
          <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
            <button className="btn btn-primary btn-sm" onClick={saveKey}><i className="fas fa-cloud-upload-alt"/>Save & Firebase Sync</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setSelKey(null)}>Close</button>
          </div>
        </div>}
      </div>
    </div>);
  };

  const DangerTab=()=>{
    const hardReset=()=>{
      const input=prompt('⚠️ Type "RESET ALL" to delete ALL app data (students, attendance, marks, etc):');
      if(!input?.includes('RESET ALL'))return;
      const ks=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('rsga3_'))ks.push(k);}
      ks.forEach(k=>localStorage.removeItem(k));
      alert('✅ All local data cleared. Page will reload.');window.location.reload();
    };
    const resetStaff=()=>{
      if(!confirm('Re-run staff update? This will re-apply all class teacher assignments.'))return;
      DB.del(STAFF_UPDATE_VER);
      window.location.reload();
    };
    const resetSeed=()=>{
      if(!confirm('Full re-initialize? All config will reset (students preserved).'))return;
      DB.del('seeded3');DB.del(STAFF_UPDATE_VER);window.location.reload();
    };
    const fbWipeUsers=async()=>{
      if(!prompt('Type "WIPE FIREBASE USERS" to overwrite Firebase users with current local users:')?.includes('WIPE FIREBASE USERS'))return;
      const users=DB.get('users',[]);
      await fbPush('users',users);
      toast('✅ Firebase users overwritten with local data');
    };
    const fbPullAll=async()=>{
      if(!confirm('Pull ALL data from Firebase? This will overwrite local data.'))return;
      if(!window.db){toast('Firebase not connected',false);return;}
      const snap=await window.db.collection('rsga_erp').get();
      const localUsers=DB.get('users',[]);
      snap.forEach(d=>{
        try{
          if(d.id==='users'){
            // Users ke liye: Firebase data lo lekin local password preserve karo
            const fbUsers=d.data().value;
            if(Array.isArray(fbUsers)){
              const merged=fbUsers.map(fu=>{
                const lu=localUsers.find(l=>l.id===fu.id);
                if(lu&&(lu.password||lu.passwordHash)){
                  return{...fu,password:lu.password||fu.password,passwordHash:lu.passwordHash||fu.passwordHash};
                }
                return fu;
              });
              localStorage.setItem('rsga3_users',JSON.stringify(merged));
            }
          }else{
            localStorage.setItem('rsga3_'+d.id,JSON.stringify(d.data().value));
          }
        }catch(e){}
      });
      toast('✅ Firebase data pulled to local. Reloading...');
      setTimeout(()=>window.location.reload(),1500);
    };
    const exportAll=()=>{
      const data=DB.exportAll();
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);const a=document.createElement('a');
      a.href=url;a.download=`rsga_full_backup_${tod()}.json`;a.click();
      toast('✅ Full backup downloaded');
    };

    const fixAadhaarMobile=async()=>{
      const students=DB.get('students',[]);
      let fixed=0;
      const updated=students.map(s=>{
        const mob=String(s.mobile||'').replace(/\D/g,'');
        // 12-digit = Aadhaar number
        if(mob.length===12){
          fixed++;
          return{...s,aadhaar:s.aadhaar||mob,mobile:''};
        }
        return s;
      });
      if(fixed===0){toast('✅ Koi galat data nahi mila — sab theek hai!');return;}
      if(!confirm(`${fixed} students ka Aadhaar number mobile field mein tha.\nAb inhe "aadhaar" field mein move karenge aur mobile blank karenge.\nFire karo?`))return;
      DB.set('students',updated);
      // Firebase sync
      if(window.db){
        try{
          await window.db.collection('rsga_erp').doc('students').set({value:updated,updatedAt:new Date().toISOString()});
          toast(`✅ ${fixed} students fix ho gaye — Firebase bhi update ho gaya!`);
        }catch(e){
          toast(`✅ ${fixed} students locally fix ho gaye (Firebase sync failed: ${e.message})`,false);
        }
      }else{
        toast(`✅ ${fixed} students locally fix ho gaye. Firebase connected nahi hai.`);
      }
    };

    const dangerItems=[
      {color:'#059669',border:'#6ee7b7',icon:'🔧',title:'Fix Aadhaar/Mobile Data',desc:'Jo students ke mobile field mein 12-digit Aadhaar number aa gaya tha — usse "aadhaar" field mein move karo, mobile blank karo. Firebase bhi update hoga.',btn:'Fix Now',fn:fixAadhaarMobile,btnClass:'btn-success'},
      {color:'#dc2626',border:'#fca5a5',icon:'🗑️',title:'Hard Reset (Local)',desc:'Saara local data delete (students, marks, attendance, config — sab). Students ka data jayega!',btn:'Reset All Local Data',fn:hardReset,btnClass:'btn-danger'},
      {color:'#b45309',border:'#fde68a',icon:'👥',title:'Re-apply Staff Updates',desc:'Re-apply staff assignments and roles (staffv4). No data loss.',btn:'Re-run Staff Update',fn:resetStaff,btnClass:'btn-warning'},
      {color:'#6d28d9',border:'#c4b5fd',icon:'🔄',title:'Full Re-initialize',desc:'App config, staff, classes reset. Students safe rahenge.',btn:'Re-initialize App',fn:resetSeed,btnClass:'btn-warning'},
      {color:'#0891b2',border:'#a5f3fc',icon:'🔥',title:'Overwrite Firebase Users',desc:'Push local user list to Firebase (override).',btn:'Push Users to Firebase',fn:fbWipeUsers,btnClass:'btn-primary'},
      {color:'#16a34a',border:'#86efac',icon:'⬇️',title:'Pull All from Firebase',desc:'Restore Firebase data to local. Local data will be overwritten.',btn:'Pull from Firebase',fn:fbPullAll,btnClass:'btn-success'},
      {color:'#1e293b',border:'#cbd5e1',icon:'💾',title:'Full Backup (JSON)',desc:'Download all local data as a JSON file.',btn:'Download Full Backup',fn:exportAll,btnClass:'btn-outline'},
    ];

    return(<div style={{display:'grid',gap:'12px'}}>
      <div className="alert alert-e"><i className="fas fa-skull-crossbones"/>Danger Zone — Proceed with caution. Some actions cannot be undone.</div>
      {dangerItems.map((d,i)=><div key={i} style={{border:`1.5px solid ${d.border}`,borderRadius:'10px',padding:'14px',display:'flex',alignItems:'center',gap:'14px',flexWrap:'wrap'}}>
        <div style={{fontSize:'24px'}}>{d.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:'800',fontSize:'13px',color:d.color,marginBottom:'3px'}}>{d.title}</div>
          <div style={{fontSize:'12px',color:'#64748b'}}>{d.desc}</div>
        </div>
        <button className={`btn btn-sm ${d.btnClass}`} onClick={d.fn}>{d.btn}</button>
      </div>)}
    </div>);
  };

  // ─────────────────────────────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────────────────────────────
  // ── CALLING ASSIGN TAB (Dev → Teacher Excel Upload) ──────────────
  const CallingAssignTab=()=>{
    const users=DB.get('users',[]).filter(u=>u.role==='classteacher'||u.role==='incharge'||u.role==='subjectteacher');
    const[selUser,setSelUser]=useState('');
    const[selType,setSelType]=useState('fee');
    const[label,setLabel]=useState('');
    const[preview,setPreview]=useState(null);
    const[saving,setSaving]=useState(false);
    const[done,setDone]=useState(false);
    const assignFileRef=React.useRef(null);
    const typeOpts=[
      {id:'fee',name:'💰 Fee Calling'},
      {id:'absent',name:'📞 Absent Calling'},
      {id:'general',name:'📋 Monthly General'},
      {id:'custom',name:'🏷️ Custom'},
    ];
    const handleFile=(e)=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:'binary'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
          if(!raw.length){alert('File empty hai!');return;}
          const norm=(k)=>k.toLowerCase().replace(/[\s_\-\.]/g,'');
          const find=(row,keys)=>{const k2=Object.keys(row).find(k=>keys.some(p=>norm(k).includes(p)));return k2?String(row[k2]).trim():'';}
          const mapped=raw.map(row=>({
            id:'ext_'+Date.now()+'_'+Math.random().toString(36).slice(2),
            name:find(row,['name','student']),
            fatherName:find(row,['father','papa','guardian']),
            mobile:find(row,['mobile','phone','contact']).replace(/\D/g,'').slice(-10),
            class:find(row,['class','cls','std']),
            section:find(row,['section','sec']),
            area:find(row,['area','village','locality']),
            srNo:find(row,['srno','sr','rollno','admno']),
          })).filter(r=>r.name||r.mobile);
          setPreview(mapped);
          if(assignFileRef.current)assignFileRef.current.value='';
        }catch(err){alert('File error: '+err.message);}
      };
      reader.readAsBinaryString(file);
    };
    const assign=()=>{
      if(!selUser||!preview||!preview.length){alert('Teacher aur file dono select karo!');return;}
      setSaving(true);
      const lbl=label.trim()||`${typeOpts.find(t=>t.id===selType)?.name} — ${new Date().toLocaleDateString('en-IN')}`;
      const key=`assigned_call_${selUser}_${selType}_${Date.now()}`;
      const payload={id:key,teacherId:selUser,type:selType,label:lbl,students:preview,assignedBy:user.name,assignedAt:new Date().toISOString(),status:'pending'};
      // Save all assignments list
      const all=DB.get('assigned_calls',[])||[];
      DB.set('assigned_calls',[...all,payload]);
      setTimeout(()=>{setSaving(false);setDone(true);setPreview(null);setSelUser('');setLabel('');setTimeout(()=>setDone(false),3000);},600);
    };
    // Show existing assignments
    const allAssign=DB.get('assigned_calls',[])||[];
    const[showHistory,setShowHistory]=useState(false);
    return(
      <div>
        <div style={{fontWeight:'800',fontSize:'14px',marginBottom:'14px',color:'#1e293b'}}>📋 Calling List — Teacher ko Assign Karo</div>
        {done&&<div style={{background:'#dcfce7',border:'1px solid #86efac',borderRadius:'10px',padding:'12px',marginBottom:'14px',fontWeight:'700',color:'#15803d'}}>✅ Successfully assigned! Teacher ko Calling Log mein dikhega.</div>}
        <div style={{display:'grid',gap:'12px',marginBottom:'16px'}}>
          <div>
            <label className="label">Teacher Select Karo *</label>
            <select className="select" value={selUser} onChange={e=>setSelUser(e.target.value)}>
              <option value="">-- Teacher --</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select>
          </div>
          <div>
            <label className="label">Calling Type</label>
            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
              {typeOpts.map(t=><button key={t.id} className="btn btn-sm" style={{background:selType===t.id?'#0f766e':'#f1f5f9',color:selType===t.id?'#fff':'#475569',border:'none'}} onClick={()=>setSelType(t.id)}>{t.name}</button>)}
            </div>
          </div>
          <div>
            <label className="label">Label / Title (optional)</label>
            <input className="input" placeholder="e.g. Fee Pending April 2026..." value={label} onChange={e=>setLabel(e.target.value)}/>
          </div>
          <div>
            <label className="label">Excel File Upload Karo *</label>
            <input type="file" accept=".xlsx,.xls,.csv" ref={assignFileRef} style={{display:'none'}} onChange={handleFile}/>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <button className="btn btn-sm" style={{background:'#0f766e',color:'#fff',border:'none'}} onClick={()=>assignFileRef.current&&assignFileRef.current.click()}><i className="fas fa-upload"/> Choose Excel File</button>
              {preview&&<span style={{fontSize:'12px',color:'#16a34a',fontWeight:'700'}}>✅ {preview.length} students loaded</span>}
            </div>
          </div>
        </div>
        {preview&&preview.length>0&&(
          <div style={{marginBottom:'14px'}}>
            <div style={{fontWeight:'700',fontSize:'12px',marginBottom:'8px',color:'#475569'}}>Preview (first 5):</div>
            <div style={{border:'1px solid #e2e8f0',borderRadius:'8px',overflow:'hidden'}}>
              <table style={{width:'100%',fontSize:'11px',borderCollapse:'collapse'}}>
                <thead><tr style={{background:'#f8fafc'}}>
                  {['Name','Father','Mobile','Class','Area'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left',fontWeight:'700',color:'#64748b'}}>{h}</th>)}
                </tr></thead>
                <tbody>{preview.slice(0,5).map((r,i)=>(
                  <tr key={i} style={{borderTop:'1px solid #f1f5f9'}}>
                    <td style={{padding:'5px 8px',fontWeight:'600'}}>{r.name||'—'}</td>
                    <td style={{padding:'5px 8px'}}>{r.fatherName||'—'}</td>
                    <td style={{padding:'5px 8px',fontFamily:'monospace'}}>{r.mobile||'—'}</td>
                    <td style={{padding:'5px 8px'}}>{r.class||'—'}{r.section?'-'+r.section:''}</td>
                    <td style={{padding:'5px 8px'}}>{r.area||'—'}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            {preview.length>5&&<div style={{fontSize:'11px',color:'#94a3b8',textAlign:'center',marginTop:'4px'}}>...aur {preview.length-5} students</div>}
          </div>
        )}
        <button className="btn btn-primary" style={{background:'#0f766e',marginBottom:'20px'}} onClick={assign} disabled={saving||!selUser||!preview}>
          {saving?<><i className="fas fa-spinner fa-spin"/> Assigning...</>:<><i className="fas fa-paper-plane"/> Assign to Teacher</>}
        </button>
        {/* History */}
        <div style={{borderTop:'1px solid #e2e8f0',paddingTop:'14px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
            <div style={{fontWeight:'700',fontSize:'13px',color:'#374151'}}>📂 Assignment History ({allAssign.length})</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowHistory(h=>!h)}>{showHistory?'Hide':'Show'}</button>
          </div>
          {showHistory&&(allAssign.length===0?<div style={{fontSize:'12px',color:'#94a3b8'}}>Koi assignment nahi abhi tak.</div>:(
            <div style={{display:'grid',gap:'8px'}}>
              {[...allAssign].reverse().map((a,i)=>{
                const teacher=users.find(u=>u.id===a.teacherId);
                return(
                  <div key={i} style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'10px 12px',fontSize:'12px'}}>
                    <div style={{fontWeight:'700',color:'#1e293b'}}>{a.label}</div>
                    <div style={{color:'#64748b',marginTop:'3px'}}>👤 {teacher?.name||a.teacherId} · {a.students?.length||0} students · {new Date(a.assignedAt).toLocaleDateString('en-IN')}</div>
                    <div style={{display:'flex',gap:'6px',marginTop:'6px'}}>
                      <span style={{fontSize:'10px',padding:'2px 8px',borderRadius:'20px',background:'#dbeafe',color:'#1d4ed8',fontWeight:'700'}}>{a.type}</span>
                      <button className="btn btn-sm btn-ghost" style={{fontSize:'10px',padding:'2px 8px'}} onClick={()=>{const all2=DB.get('assigned_calls',[]).filter(x=>x.id!==a.id);DB.set('assigned_calls',all2);toast('Deleted');}}><i className="fas fa-trash"/> Delete</button>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────
  const tabs=[
    {id:'staff',label:'👥 Staff',comp:<StaffTab/>},
    {id:'requests',label:'📩 Requests',comp:<RequestsPanel user={user}/>},
    {id:'structure',label:'🏫 Classes',comp:<StructureTab/>},
    {id:'perms',label:'🔐 Permissions',comp:<PermsTab/>},
    {id:'callingassign',label:'📋 Calling Assign',comp:<CallingAssignTab/>},
    {id:'data',label:'🗄️ Data',comp:<DataTab/>},
    {id:'config',label:'🎨 App Config',comp:<AppConfigTab/>},
    {id:'masterkey',label:'🗝️ Master Key',comp:<MasterPasswordTab/>},
    {id:'danger',label:'⚠️ Danger',comp:<DangerTab/>},
  ];

  return(<div className="fade">
    <div style={{background:'linear-gradient(135deg,#0f172a,#1e1b4b)',borderRadius:'12px',padding:'14px 18px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px'}}>
      <span style={{fontSize:'22px'}}>⚡</span>
      <div>
        <div style={{fontWeight:'900',fontSize:'15px',color:'#fff',fontFamily:'JetBrains Mono'}}>RSGA Developer Console</div>
        <div style={{fontSize:'11px',color:'rgba(255,255,255,.5)',marginTop:'2px'}}>Logged in as {user.name} • Full system access</div>
      </div>
      {msg&&<div style={{marginLeft:'auto',background:msg.ok?'#16a34a':'#dc2626',color:'#fff',padding:'6px 12px',borderRadius:'8px',fontSize:'12px',fontWeight:'700'}}>{msg.t}</div>}
    </div>
    <div className="tab-bar" style={{flexWrap:'wrap'}}>
      {tabs.map(t=><div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}
    </div>
    <div style={{marginTop:'16px'}}>
      {tabs.find(t=>t.id===tab)?.comp}
    </div>
  </div>);
}
